// --- RENDERIZADO DEL MAPA ---
function drawMap() {
  const map = maps[game.currentMap];
  const camX = Math.max(0, Math.min(map.width - COLS, game.player.x - Math.floor(COLS / 2)));
  const camY = Math.max(0, Math.min(map.height - ROWS, game.player.y - Math.floor(ROWS / 2)));
  game.camera.x = camX;
  game.camera.y = camY;

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const mx = camX + x;
      const my = camY + y;
      if (mx < 0 || my < 0 || mx >= map.width || my >= map.height) {
        vctx.drawImage(tileSprites.void, x * TILE, y * TILE);
        continue;
      }
      const tileId = map.data[my][mx];
      const tileName = tileMap[tileId] || 'void';
      if (tileSprites[tileName]) {
        vctx.drawImage(tileSprites[tileName], x * TILE, y * TILE);
      }
    }
  }

  // Draw NPCs
  for (const npc of map.npcs) {
    if (game.flags[npc.id + '_gone']) continue;
    const sx = (npc.x - camX) * TILE;
    const sy = (npc.y - camY) * TILE;
    if (sx < -TILE || sx > VIRT_W || sy < -TILE || sy > VIRT_H) continue;

    let sprite;
    switch (npc.sprite) {
      case 'alcalde': sprite = sprAlcalde; break;
      case 'villager1': sprite = sprVillager1; break;
      case 'villager2': sprite = sprVillager2; break;
      case 'marina': sprite = sprMarina; break;
      case 'oldman': sprite = sprOldMan; break;
      case 'pau': sprite = sprPau; break;
      case 'gojo': sprite = sprGojo; break;
      case 'sukuna': sprite = sprSukuna; break;
      default: sprite = sprVillager1;
    }
    const frame = npc.dir || 0;
    vctx.drawImage(sprite, 0, frame * 16, 16, 16, sx, sy, 16, 16);

    // Indicador de interacción
    if (Math.abs(npc.x - game.player.x) + Math.abs(npc.y - game.player.y) <= 2) {
      if (Math.floor(game.tick / 20) % 2) {
        drawText(vctx, '!', sx + 6, sy - 8, PAL.yellow, 8);
      }
    }
  }

  // Draw player
  const px = (game.player.x - camX) * TILE;
  const py = (game.player.y - camY) * TILE;
  const frame = game.player.dir;
  vctx.drawImage(sprJavier, 0, frame * 16, 16, 16, px, py, 16, 16);

  // Draw party followers
  // (simplified - just show indicators)
  if (game.party.length > 1) {
    const partyIcons = game.party.slice(1);
    partyIcons.forEach((p, i) => {
      const fx = px - 8 - i * 4;
      const fy = py + 4;
      vctx.fillStyle = p.id === 'marina' ? PAL.purple : p.id === 'gojo' ? '#4488FF' : p.id === 'sukuna' ? '#FF3355' : PAL.orange;
      vctx.fillRect(fx, fy, 4, 4);
    });
  }
}

// --- HUD ---
function drawHUD() {
  // Barra inferior del mapa
  drawBox(vctx, 0, ROWS * TILE, VIRT_W, 48);

  const map = maps[game.currentMap];
  drawText(vctx, map.name, 5, ROWS * TILE + 4, PAL.cyan, 8);

  // Party HP/MP
  const hudSpacing = game.party.length > 3 ? Math.floor((VIRT_W - 10) / game.party.length) : 85;
  game.party.forEach((p, i) => {
    const sx = 5 + i * hudSpacing;
    const sy = ROWS * TILE + 16;
    drawText(vctx, p.name.substring(0, 4), sx, sy, PAL.white, 7);
    drawText(vctx, p.hp + '/' + p.maxHp, sx, sy + 10, p.hp < p.maxHp * 0.3 ? PAL.red : PAL.green, 6);
    if (game.party.length <= 3) drawText(vctx, 'MP:' + p.mp + '/' + p.maxMp, sx, sy + 20, PAL.cyan, 7);
  });
}

// --- MENÚ ---
function drawMenu() {
  drawBox(vctx, 20, 10, VIRT_W - 40, VIRT_H - 20);
  drawText(vctx, '--- MENÚ ---', 80, 16, PAL.gold, 10);

  const cardH = game.party.length > 3 ? 38 : 50;

    const sy = 35 + i * (cardH + 5);

    drawText(vctx, 'HP: ' + p.hp + '/' + p.maxHp + '   MP: ' + p.mp + '/' + p.maxMp, 30, sy + 16, PAL.white, 7);
    if (cardH > 40) {
      drawText(vctx, 'ATK:' + p.atk + ' DEF:' + p.def + ' SPD:' + p.spd + ' MAG:' + p.mag, 30, sy + 26, PAL.lightGray, 7);
    }
  });

  drawText(vctx, 'Gil: ' + game.gil, 30, iy, PAL.gold, 8);
  drawText(vctx, 'Objetos:', 30, iy + 14, PAL.white, 8);
  game.items.filter(i => i.count > 0).forEach((item, idx) => {
    drawText(vctx, item.name + ' x' + item.count, 40, iy + 26 + idx * 10, PAL.lightGray, 7);
  });

  drawText(vctx, 'ESC para cerrar', 75, VIRT_H - 30, PAL.darkGray, 7);
}

// --- PANTALLA DE TÍTULO ---
function drawTitle() {
  // Gradient background (deep blue to black)
  for (let y = 0; y < VIRT_H; y++) {
    const t = y / VIRT_H;
    const r = Math.floor(8 - t * 8);
    const g = Math.floor(8 + t * 4);
    const b = Math.floor(30 - t * 18);
    vctx.fillStyle = `rgb(${r},${g},${b})`;
    vctx.fillRect(0, y, VIRT_W, 1);
  }

  // Twinkling stars (many layers)
  for (let i = 0; i < 70; i++) {
    const sx = ((97 * (i + 1) * 7 + 23) % VIRT_W);
    const sy = ((97 * (i + 1) * 13 + 5) % (VIRT_H - 60));
    const brightness = Math.sin(game.tick * 0.025 + i * 0.9) * 0.5 + 0.5;
    const size = i < 10 ? 2 : 1;
    vctx.fillStyle = `rgba(255,255,255,${brightness * 0.8})`;
    vctx.fillRect(sx, sy, size, size);
  }
  // Shooting star occasionally
  const shootFrame = (game.tick % 300);
  if (shootFrame < 20) {
    const sx = 200 - shootFrame * 8;
    const sy = 30 + shootFrame * 2;
    vctx.fillStyle = 'rgba(255,255,255,0.7)';
    vctx.fillRect(sx, sy, 3, 1);
    vctx.fillStyle = 'rgba(200,200,255,0.3)';
    vctx.fillRect(sx + 3, sy, 8, 1);
  }

  // === ANIMATED CRYSTAL (center, elaborate) ===
  const crystalY = 62;
  const pulse = Math.sin(game.tick * 0.05) * 2;
  const glow = Math.sin(game.tick * 0.03) * 0.2 + 0.4;
  // Crystal glow behind
  vctx.fillStyle = `rgba(100, 80, 200, ${glow * 0.3})`;
  vctx.beginPath(); vctx.arc(VIRT_W/2, crystalY + 12 + pulse, 18 + pulse, 0, Math.PI * 2); vctx.fill();
  vctx.fillStyle = `rgba(140, 100, 255, ${glow * 0.2})`;
  vctx.beginPath(); vctx.arc(VIRT_W/2, crystalY + 12 + pulse, 25 + pulse * 1.5, 0, Math.PI * 2); vctx.fill();
  // Crystal body
  const cx = VIRT_W / 2;
  vctx.fillStyle = '#6644BB';
  vctx.beginPath();
  vctx.moveTo(cx, crystalY - 8 + pulse);
  vctx.lineTo(cx + 8, crystalY + 6 + pulse);
  vctx.lineTo(cx + 6, crystalY + 24 + pulse);
  vctx.lineTo(cx - 6, crystalY + 24 + pulse);
  vctx.lineTo(cx - 8, crystalY + 6 + pulse);
  vctx.closePath(); vctx.fill();
  // Crystal facet (lighter)
  vctx.fillStyle = '#8866DD';
  vctx.beginPath();
  vctx.moveTo(cx, crystalY - 8 + pulse);
  vctx.lineTo(cx + 4, crystalY + 10 + pulse);
  vctx.lineTo(cx, crystalY + 22 + pulse);
  vctx.lineTo(cx - 4, crystalY + 10 + pulse);
  vctx.closePath(); vctx.fill();
  // Crystal shine
  vctx.fillStyle = '#CCBBFF';
  vctx.fillRect(cx - 2, crystalY - 4 + pulse, 2, 4);
  px(vctx, cx - 3, crystalY - 2 + pulse, '#DDCCFF');
  // Sparkles around crystal
  for (let i = 0; i < 5; i++) {
    const angle = game.tick * 0.04 + i * 1.26;
    const dist = 14 + Math.sin(game.tick * 0.06 + i) * 4;
    const sx = cx + Math.cos(angle) * dist;
    const sy = crystalY + 10 + Math.sin(angle) * dist * 0.6 + pulse;
    const br = Math.sin(game.tick * 0.08 + i * 2) * 0.5 + 0.5;
    vctx.fillStyle = `rgba(200,180,255,${br * 0.7})`;
    vctx.fillRect(sx, sy, 2, 2);
  }

  // === TITLE TEXT ===
  const titleY = 20 + Math.sin(game.tick * 0.025) * 2;

  // Title shadow
  drawText(vctx, 'FINAL FANTASY', 56, titleY + 1, 'rgba(0,0,0,0.6)', 12);
  drawText(vctx, 'FINAL FANTASY', 55, titleY, '#88CCFF', 12);

  drawText(vctx, 'CATALONIA', 76, titleY + 17, 'rgba(0,0,0,0.6)', 12);
  drawText(vctx, 'CATALONIA', 75, titleY + 16, PAL.gold, 12);

  // Subtitle
  drawText(vctx, 'La Sombra de Montserrat', 48, 100, '#8899AA', 8);

  // Decorative line
  vctx.fillStyle = '#334466';
  vctx.fillRect(40, 112, VIRT_W - 80, 1);
  vctx.fillStyle = '#556688';
  vctx.fillRect(60, 113, VIRT_W - 120, 1);

  // === MENU OPTIONS ===
  const menuY = 125;
  const hasSave = game._pendingSave;
  if (hasSave) {
    const sel1 = game._titleCursor === 0;
    const sel2 = game._titleCursor === 1;
    if (sel1) drawText(vctx, '\u25b6', 60, menuY, PAL.yellow, 8);
    drawText(vctx, 'CONTINUAR', 72, menuY, sel1 ? PAL.yellow : '#667788', 8);
    if (sel2) drawText(vctx, '\u25b6', 60, menuY + 14, PAL.yellow, 8);
    drawText(vctx, 'NUEVA PARTIDA', 72, menuY + 14, sel2 ? PAL.yellow : '#667788', 8);
  } else {
    if (Math.floor(game.tick / 25) % 2) {
      drawText(vctx, 'Pulsa ENTER para empezar', 44, menuY + 7, PAL.white, 8);
    }
  }

  // Controls (smaller, at bottom)
  drawText(vctx, 'Flechas: Mover', 30, 170, '#445566', 7);
  drawText(vctx, 'Enter/Espacio: Acci\u00f3n', 30, 180, '#445566', 7);
  drawText(vctx, 'M: Men\u00fa  ESC: Atr\u00e1s', 30, 190, '#445566', 7);

  // Version
  drawText(vctx, 'v1.0 Demo', 95, VIRT_H - 12, '#334455', 7);

  // Bottom horizon line
  vctx.fillStyle = 'rgba(60,80,120,0.2)';
  vctx.fillRect(0, VIRT_H - 1, VIRT_W, 1);
}

// --- PANTALLA GAME OVER ---
function drawGameOver() {
  vctx.fillStyle = '#0A0000';
  vctx.fillRect(0, 0, VIRT_W, VIRT_H);

  drawText(vctx, 'GAME OVER', 72, 70, PAL.red, 14);
  drawText(vctx, 'La oscuridad ha vencido...', 52, 110, PAL.darkGray, 8);

  if (Math.floor(game.tick / 30) % 2) {
    drawText(vctx, 'Pulsa ENTER para reiniciar', 42, 160, PAL.white, 8);
  }
}

// --- PANTALLA DE VICTORIA FINAL ---
function drawVictoryScreen() {
  vctx.fillStyle = '#000A1A';
  vctx.fillRect(0, 0, VIRT_W, VIRT_H);

  // Estrellas
  for (let i = 0; i < 80; i++) {
    const sx = ((37 * (i + 1) * 7) % VIRT_W);
    const sy = ((37 * (i + 1) * 13) % VIRT_H);
    const brightness = Math.sin(game.tick * 0.03 + i) * 0.5 + 0.5;
    vctx.fillStyle = `rgba(255,255,255,${brightness})`;
    vctx.fillRect(sx, sy, 1, 1);
  }

  const scrollY = Math.max(0, 200 - game.tick * 0.3);

  drawText(vctx, '¡VICTORIA!', 72, 20 + scrollY, PAL.gold, 14);

  const lines = [
    '',
    'El Señor de las Sombras ha sido derrotado.',
    '',
    'La paz vuelve a Cataluña.',
    '',
    'Los héroes regresan a Vila Nova',
    'donde son recibidos como leyendas.',
    '',
    '- - - - - - - - -',
    '',
    'JAVIER LINARES',
    'Guerrero de Vila Nova',
    '',
    'MARINA',
    'Maga de las Artes Arcanas',
    '',
    'PAU',
    'Monje de Montserrat',
    '',
    '- - - - - - - - -',
    '',
    'Gracias por jugar a la Demo de',

    '',
    'Continuará...',
  ];

  lines.forEach((line, i) => {
    const ly = 50 + i * 12 + scrollY;
    if (ly > 0 && ly < VIRT_H) {
      const color = line.includes('JAVIER') || line.includes('MARINA') || line.includes('PAU') || line.includes('FINAL')
        ? PAL.gold : line.includes('- -') ? PAL.cyan : PAL.white;
      const xOff = Math.max(0, (VIRT_W - line.length * 5) / 2);
      drawText(vctx, line, xOff, ly, color, 8);
    }
  });

  if (game.tick > 500) {
    if (Math.floor(game.tick / 30) % 2) {
      drawText(vctx, 'Pulsa ENTER', 85, VIRT_H - 20, PAL.lightGray, 8);
    }
  }
}

// --- INTRO / CUTSCENE ---
function startIntro() {
  game.state = 'dialogue';
  game.currentMap = 'village';
  game.player.x = maps.village.startX;
  game.player.y = maps.village.startY;
  initParty();
  playMusic('world');

  startDialogue([
    { speaker: null, text: 'Vila Nova, un tranquilo pueblo en las tierras de Cataluña...' },
    { speaker: null, text: 'Durante generaciones, sus habitantes han vivido en paz.' },
    { speaker: null, text: 'Pero últimamente, sombras extrañas aparecen por la noche...' },
    { speaker: null, text: 'Y los monstruos del bosque se vuelven cada vez más agresivos.' },
    { speaker: 'Javier', text: '(Algo no va bien. Debería hablar con el Alcalde Bernat.)' },
    { speaker: null, text: '>> Usa las FLECHAS para moverte y ENTER/ESPACIO para interactuar. M para el menú.' },
  ]);
}

// --- TRANSICIONES ---
function updateTransition() {
  if (!game.transition) return;
  const t = game.transition;
  t.timer--;
  if (t.timer <= 0) {
    if (t.type === 'fadeOut') {
      game.currentMap = t.target;
      game.player.x = t.px;
      game.player.y = t.py;
      game.transition = { type: 'fadeIn', timer: 20 };
    } else {
      game.transition = null;
    }
  }
}

function drawTransition() {
  if (!game.transition) return;
  const t = game.transition;
  let alpha;
  if (t.type === 'fadeOut') {
    alpha = 1 - t.timer / 20;
  } else {
    alpha = t.timer / 20;
  }
  vctx.fillStyle = `rgba(0,0,0,${alpha})`;
  vctx.fillRect(0, 0, VIRT_W, VIRT_H);
}

// --- GAME LOOP PRINCIPAL ---
function update() {
  game.tick++;
  game.animFrame = Math.floor(game.tick / 10) % 4;

  if (game.moveDelay > 0) game.moveDelay--;

  switch (game.state) {
    case 'title':
      if (!game.musicStarted && audioCtx) { game.musicStarted = true; playMusic('menu'); }
      if (!game._titleCursor) game._titleCursor = 0;
      if (isJustPressed('o') || isJustPressed('O')) { initAudio(); toggleSettings(); }
      if (game._pendingSave) {
        // Menu navigation: Continue / New Game
        if (isJustPressed('ArrowUp') || isJustPressed('ArrowDown')) {
          game._titleCursor = game._titleCursor === 0 ? 1 : 0;
          sfxCursor();
        }
        if (isJustPressed('Enter') || isJustPressed(' ')) {
          initAudio(); sfxSelect();
          if (game._titleCursor === 0) {
            // Continue: apply saved data
            applyLoadedGame(game._pendingSave);
            game._pendingSave = null;
            game.state = 'explore';
            playMusic('world');
          } else {
            game._pendingSave = null;
            startIntro();
          }
        }
      } else {
        if (isJustPressed('Enter') || isJustPressed(' ')) {
          initAudio(); sfxSelect();
          startIntro();
        }
      }
      break;

    case 'explore':
      if (game.transition) {
        updateTransition();
        break;
      }
      if (isJustPressed('o') || isJustPressed('O')) { toggleSettings(); break; }
      // Movimiento
      if (keys['ArrowUp']) movePlayer(0, -1);
      else if (keys['ArrowDown']) movePlayer(0, 1);
      else if (keys['ArrowLeft']) movePlayer(-1, 0);
      else if (keys['ArrowRight']) movePlayer(1, 0);

      // Interactuar
      if (isJustPressed(' ') || isJustPressed('Enter')) {
        interact();
      }

      // Menú
      if (isJustPressed('m') || isJustPressed('M')) {
        game.state = 'menu';
        sfxSelect();
      }
      break;

    case 'dialogue':
      updateDialogue();
      break;

    case 'battle':
      updateBattle();
      break;

    case 'menu':
      if (isJustPressed('o') || isJustPressed('O')) { toggleSettings(); break; }
      if (isJustPressed('Escape') || isJustPressed('m') || isJustPressed('M')) {
        game.state = 'explore';
        sfxSelect();
      }
      break;

    case 'gameover':
      if (isJustPressed('Enter') || isJustPressed(' ')) {
        game.state = 'title';
        game.flags = {};
        game.tick = 0;
        game.musicStarted = false;
        playMusic('menu');
      }
      break;

    case 'victory':
      if (game.tick > 500 && (isJustPressed('Enter') || isJustPressed(' '))) {
        game.state = 'title';
        game.flags = {};
        game.tick = 0;
        game.musicStarted = false;
        playMusic('menu');
      }
      break;
  }

  // Settings overlay input (processed AFTER state switch to intercept)
  if (settingsState.open) updateSettings();
  clearJustPressed();
}

function draw() {
  vctx.fillStyle = PAL.black;
  vctx.fillRect(0, 0, VIRT_W, VIRT_H);

  switch (game.state) {
    case 'title':
      drawTitle();
      break;

    case 'explore':
      drawMap();
      drawHUD();
      drawTransition();
      break;

    case 'dialogue':
      // Seguir mostrando el mapa de fondo si no estamos en batalla
      if (game.battle) {
        drawBattle();
      } else {
        drawMap();
        drawHUD();
      }
      drawDialogue();
      break;

    case 'battle':
      drawBattle();
      break;

    case 'menu':
      drawMap();
      drawMenu();
      break;

    case 'gameover':
      drawGameOver();
      break;

    case 'victory':
      drawVictoryScreen();
      break;
  }

  // Settings overlay on top of everything
  drawSettings();

  // Hint for settings key
  if (game.state === 'title') {
    const alpha = 0.5 + 0.3 * Math.sin(game.tick * 0.08);
    vctx.globalAlpha = alpha;
    drawText(vctx, 'O: Configuraci\u00f3n', VIRT_W - 84, VIRT_H - 12, PAL.darkGray, 7);
    vctx.globalAlpha = 1;
  } else if (game.state === 'explore' || game.state === 'menu') {
    drawText(vctx, 'O: Config', VIRT_W - 52, VIRT_H - 10, PAL.darkGray, 6);
  }

  // Escalar al canvas principal
  ctx.drawImage(vcanvas, 0, 0, VIRT_W, VIRT_H, 0, 0, canvas.width, canvas.height);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
