<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Final Fantasy Catalonia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Press Start 2P', monospace; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; cursor: none; }
#ui-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; font-family: 'Press Start 2P', monospace; color: white;
}
/* --- AUTH OVERLAY --- */
#auth-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
  background: radial-gradient(ellipse at center, #0A0A2E 0%, #000010 70%);
  display: flex; justify-content: center; align-items: center;
  font-family: 'Press Start 2P', monospace; color: #FFF;
}
#auth-overlay.hidden { display: none; }
.auth-stars {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: transparent; pointer-events: none;
}
.auth-box {
  position: relative; z-index: 2;
  border: 3px solid #4466AA; background: rgba(8, 8, 40, 0.95); border-radius: 4px;
  padding: 32px 40px; min-width: 420px; max-width: 480px;
  box-shadow: 0 0 30px rgba(50, 80, 180, 0.3), inset 0 0 20px rgba(50, 80, 180, 0.1);
}
.auth-box::before {
  content: ''; position: absolute; inset: 3px; border: 1px solid #8899CC;
  border-radius: 2px; pointer-events: none;
}
.auth-title { text-align: center; font-size: 11px; color: #88CCFF; margin-bottom: 6px; text-shadow: 0 0 10px rgba(100,180,255,0.5); }
.auth-subtitle { text-align: center; font-size: 20px; color: #FFD700; margin-bottom: 24px; text-shadow: 2px 2px 0px #AA6600; letter-spacing: 2px; }
.auth-label { display: block; font-size: 8px; color: #88AACC; margin-bottom: 6px; }
.auth-input {
  width: 100%; padding: 10px 12px; margin-bottom: 16px;
  background: #0A0A2A; border: 2px solid #334488; border-radius: 2px;
  color: #FFF; font-family: 'Press Start 2P', monospace; font-size: 10px;
  outline: none; transition: border-color 0.2s;
}
.auth-input:focus { border-color: #6688CC; box-shadow: 0 0 8px rgba(100,130,200,0.3); }
.auth-input::placeholder { color: #334466; }
.auth-btn {
  width: 100%; padding: 12px; margin-top: 8px;
  background: linear-gradient(180deg, #2244AA 0%, #1A2266 100%);
  border: 2px solid #4466CC; border-radius: 2px;
  color: #FFD700; font-family: 'Press Start 2P', monospace; font-size: 10px;
  cursor: pointer; text-shadow: 1px 1px 0px #000;
  transition: all 0.15s;
}
.auth-btn:hover { background: linear-gradient(180deg, #3355CC 0%, #2233AA 100%); border-color: #6688EE; transform: translateY(-1px); }
.auth-btn:active { transform: translateY(1px); }
.auth-switch { text-align: center; margin-top: 16px; font-size: 7px; color: #667788; }
.auth-switch a { color: #4488CC; cursor: pointer; text-decoration: underline; }
.auth-switch a:hover { color: #66AAEE; }
.auth-error { color: #FF4444; font-size: 7px; text-align: center; margin-top: 8px; min-height: 12px; }
.auth-success { color: #44FF44; font-size: 7px; text-align: center; margin-top: 8px; }
.auth-user-bar {
  position: fixed; top: 8px; right: 12px; z-index: 50;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #88AACC; display: flex; gap: 12px; align-items: center;
}
.auth-user-bar.hidden { display: none; }
.auth-user-bar span { color: #FFD700; }
.auth-user-bar button {
  background: none; border: 1px solid #445566; color: #88AACC;
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  padding: 3px 8px; cursor: pointer; border-radius: 2px;
}
.auth-user-bar button:hover { border-color: #6688AA; color: #AACCEE; }
.auth-lock-icon { font-size: 10px; margin-right: 4px; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-title">FINAL FANTASY</div>
    <div class="auth-subtitle">CATALONIA</div>
    <div id="auth-login">
      <label class="auth-label">USUARIO</label>
      <input class="auth-input" id="login-user" type="text" placeholder="Tu nombre de guerrero" autocomplete="username" maxlength="20">
      <label class="auth-label">CONTRASEÑA</label>
      <input class="auth-input" id="login-pass" type="password" placeholder="Clave secreta" autocomplete="current-password">
      <button class="auth-btn" id="btn-login">⚔ INICIAR SESIÓN</button>
      <div class="auth-switch">¿No tienes cuenta? <a id="show-register">Registrarse</a></div>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="auth-register" style="display:none">
      <label class="auth-label">USUARIO (3-20 caracteres)</label>
      <input class="auth-input" id="reg-user" type="text" placeholder="Elige tu nombre" autocomplete="username" maxlength="20">
      <label class="auth-label">CONTRASEÑA (mín. 6 caracteres)</label>
      <input class="auth-input" id="reg-pass" type="password" placeholder="Clave secreta" autocomplete="new-password">
      <label class="auth-label">CONFIRMAR CONTRASEÑA</label>
      <input class="auth-input" id="reg-pass2" type="password" placeholder="Repite la clave" autocomplete="new-password">
      <button class="auth-btn" id="btn-register">✦ CREAR CUENTA</button>
      <div class="auth-switch">¿Ya tienes cuenta? <a id="show-login">Iniciar Sesión</a></div>
      <div class="auth-error" id="reg-error"></div>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:6px;color:#334455">
      🔒 Cifrado PBKDF2 + AES-256-GCM · Datos locales seguros
    </div>
  </div>
</div>

<!-- User bar -->
<div class="auth-user-bar hidden" id="user-bar">
  <span class="auth-lock-icon">🔒</span> <span id="user-display"></span>
  <button id="btn-save">💾 GUARDAR</button>
  <button id="btn-logout">SALIR</button>
</div>
<script>
// ============================================================
//  FINAL FANTASY CATALONIA - Demo
//  Un juego RPG estilo Final Fantasy IV
//  Creado con HTML5 Canvas y JavaScript puro
// ============================================================

// ============== SISTEMA DE AUTENTICACIÓN CIFRADO ==============
const AUTH = {
  currentUser: null,
  db: null,
};

// --- IndexedDB ---
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('ffc_auth_db', 2);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath: 'username' });
      if (!db.objectStoreNames.contains('saves')) db.createObjectStore('saves', { keyPath: 'username' });
    };
    req.onsuccess = () => { AUTH.db = req.result; resolve(req.result); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = AUTH.db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = AUTH.db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// --- Crypto: PBKDF2 + AES-256-GCM ---
function salt16() { return crypto.getRandomValues(new Uint8Array(16)); }
function u8ToB64(u8) { return btoa(String.fromCharCode.apply(null, u8)); }
function b64ToU8(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }

async function pbkdf2Hash(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' }, km, 256);
  return u8ToB64(new Uint8Array(bits));
}

async function deriveAESKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' }, km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

async function encryptData(plainObj, password, salt) {
  const key = await deriveAESKey(password, salt);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(plainObj)));
  return { iv: u8ToB64(iv), ct: u8ToB64(new Uint8Array(ct)) };
}

async function decryptData(encObj, password, salt) {
  const key = await deriveAESKey(password, salt);
  const iv = b64ToU8(encObj.iv);
  const ct = b64ToU8(encObj.ct);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

// --- Registro ---
async function authRegister(username, password) {
  if (!username || username.length < 3) throw new Error('Usuario: mín. 3 caracteres');
  if (!password || password.length < 6) throw new Error('Contraseña: mín. 6 caracteres');
  const existing = await dbGet('users', username);
  if (existing) throw new Error('El usuario ya existe');
  const salt = salt16();
  const hash = await pbkdf2Hash(password, salt);
  await dbPut('users', { username, salt: u8ToB64(salt), hash });
  return true;
}

// --- Login ---
async function authLogin(username, password) {
  const user = await dbGet('users', username);
  if (!user) throw new Error('Usuario no encontrado');
  const salt = b64ToU8(user.salt);
  const hash = await pbkdf2Hash(password, salt);
  if (hash !== user.hash) throw new Error('Contraseña incorrecta');
  AUTH.currentUser = { username, password, salt };
  return true;
}

// --- Guardar partida (cifrada) ---
async function saveGame() {
  if (!AUTH.currentUser) return;
  const saveData = {
    party: game.party, items: game.items, gil: game.gil,
    flags: game.flags, currentMap: game.currentMap,
    playerX: game.player.x, playerY: game.player.y,
    playerDir: game.player.dir, stepCount: game.player.stepCount,
    timestamp: Date.now(),
  };
  const salt = AUTH.currentUser.salt;
  const encrypted = await encryptData(saveData, AUTH.currentUser.password, salt);
  await dbPut('saves', { username: AUTH.currentUser.username, encrypted });
}

// --- Cargar partida (descifrada) ---
async function loadGame() {
  if (!AUTH.currentUser) return null;
  const save = await dbGet('saves', AUTH.currentUser.username);
  if (!save || !save.encrypted) return null;
  try {
    const data = await decryptData(save.encrypted, AUTH.currentUser.password, AUTH.currentUser.salt);
    return data;
  } catch (e) {
    console.warn('Error descifrando partida:', e);
    return null;
  }
}

function applyLoadedGame(data) {
  if (!data) return false;
  game.party = data.party;
  game.items = data.items;
  game.gil = data.gil;
  game.flags = data.flags;
  game.currentMap = data.currentMap;
  game.player.x = data.playerX;
  game.player.y = data.playerY;
  game.player.dir = data.playerDir;
  game.player.stepCount = data.stepCount || 0;
  // Re-link skills from SKILLS object
  game.party.forEach(p => {
    const skillMap = { 'javier': [SKILLS.golpeFuerte, SKILLS.gritoGuerra], 'marina': [SKILLS.fuego, SKILLS.hielo, SKILLS.cura], 'pau': [SKILLS.punoSagrado, SKILLS.curaMayor, SKILLS.proteger], 'gojo': [SKILLS.infinito, SKILLS.azulAtraccion, SKILLS.rojoRepulsion, SKILLS.hollowPurple, SKILLS.domainVoid], 'sukuna': [SKILLS.cleave, SKILLS.dismantle, SKILLS.fireArrow, SKILLS.fuga, SKILLS.domainShrine] };
    if (skillMap[p.id]) p.skills = skillMap[p.id];
    // Unlock Rayo for high-level Marina
    if (p.id === 'marina' && p.level >= 6 && !p.skills.find(s => s.name === 'Rayo')) p.skills.push(SKILLS.rayo);
  });
  return true;
}

// --- Auto-save cada 60 segundos ---
let autoSaveInterval = null;
function startAutoSave() {
  if (autoSaveInterval) clearInterval(autoSaveInterval);
  autoSaveInterval = setInterval(() => {
    if (AUTH.currentUser && game.state === 'explore') saveGame().catch(() => {});
  }, 60000);
}

// --- UI de Auth ---
function initAuthUI() {
  document.getElementById('show-register').onclick = () => {
    document.getElementById('auth-login').style.display = 'none';
    document.getElementById('auth-register').style.display = 'block';
    document.getElementById('reg-error').textContent = '';
  };
  document.getElementById('show-login').onclick = () => {
    document.getElementById('auth-register').style.display = 'none';
    document.getElementById('auth-login').style.display = 'block';
    document.getElementById('login-error').textContent = '';
  };
  document.getElementById('btn-register').onclick = async () => {
    const u = document.getElementById('reg-user').value.trim();
    const p = document.getElementById('reg-pass').value;
    const p2 = document.getElementById('reg-pass2').value;
    const errEl = document.getElementById('reg-error');
    if (p !== p2) { errEl.textContent = 'Las contraseñas no coinciden'; return; }
    try {
      errEl.textContent = 'Cifrando...'; errEl.className = 'auth-success';
      await authRegister(u, p);
      errEl.textContent = '¡Cuenta creada! Iniciando sesión...';
      await authLogin(u, p);
      onAuthSuccess();
    } catch (e) { errEl.textContent = e.message; errEl.className = 'auth-error'; }
  };
  document.getElementById('btn-login').onclick = async () => {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    try {
      errEl.textContent = 'Verificando...'; errEl.className = 'auth-success';
      await authLogin(u, p);
      onAuthSuccess();
    } catch (e) { errEl.textContent = e.message; errEl.className = 'auth-error'; }
  };
  document.getElementById('btn-save').onclick = async () => {
    const btn = document.getElementById('btn-save');
    btn.textContent = 'Guardando...';
    await saveGame().catch(() => {});
    btn.textContent = '\u2714 Guardado!';
    setTimeout(() => btn.textContent = '\uD83D\uDCBE GUARDAR', 2000);
  };
  document.getElementById('btn-logout').onclick = () => {
    AUTH.currentUser = null;
    if (autoSaveInterval) clearInterval(autoSaveInterval);
    document.getElementById('auth-overlay').classList.remove('hidden');
    document.getElementById('user-bar').classList.add('hidden');
    game.state = 'title'; game.flags = {}; game.tick = 0; game.musicStarted = false;
    stopMusic();
  };
  // Enter key support
  ['login-user', 'login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-login').click(); });
  });
  ['reg-user', 'reg-pass', 'reg-pass2'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-register').click(); });
  });
}

async function onAuthSuccess() {
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('user-bar').classList.remove('hidden');
  document.getElementById('user-display').textContent = AUTH.currentUser.username;
  startAutoSave();
  // Try to load saved game
  const saved = await loadGame();
  if (saved) {
    game._pendingSave = saved; // Will be offered at title screen
  }
}

// ============== FIN AUTH ==============

// --- CONFIGURACIÓN GLOBAL ---
const TILE = 16;
const COLS = 16;
const ROWS = 12;
const VIRT_W = COLS * TILE; // 256
const VIRT_H = ROWS * TILE + 48; // 240 (192 map + 48 UI)
const SCALE = 3;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = VIRT_W * SCALE;
canvas.height = VIRT_H * SCALE;
ctx.imageSmoothingEnabled = false;

// Buffer virtual
const vcanvas = document.createElement('canvas');
vcanvas.width = VIRT_W;
vcanvas.height = VIRT_H;
const vctx = vcanvas.getContext('2d');
vctx.imageSmoothingEnabled = false;

// --- SISTEMA DE AUDIO COMPLETO ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

// Configuración de audio (persistida en localStorage)
const audioSettings = { musicVolume: 0.5, sfxVolume: 0.7, masterVolume: 0.8 };
try { const s = localStorage.getItem('ffc_audio'); if (s) Object.assign(audioSettings, JSON.parse(s)); } catch(e) {}
function saveAudioSettings() { try { localStorage.setItem('ffc_audio', JSON.stringify(audioSettings)); } catch(e) {} }

// --- MÚSICA (MP3) ---
const music = { tracks: {}, current: null, currentName: '', fadeInterval: null };
function loadMusic() {
  ['menu', 'world', 'battle'].forEach(name => {
    const a = new Audio('songs/' + name + '.mp3');
    a.loop = true; a.preload = 'auto'; a.volume = 0;
    music.tracks[name] = a;
  });
}
function getMusicVol() { return audioSettings.musicVolume * audioSettings.masterVolume; }
function playMusic(name) {
  if (music.currentName === name) return;
  if (music.fadeInterval) clearInterval(music.fadeInterval);
  const old = music.current;
  if (old) {
    const fi = setInterval(() => {
      old.volume = Math.max(0, old.volume - 0.04);
      if (old.volume <= 0.01) { clearInterval(fi); old.pause(); old.currentTime = 0; }
    }, 25);
  }
  const track = music.tracks[name];
  if (track) {
    track.volume = 0;
    track.play().catch(() => {});
    const tv = getMusicVol();
    music.fadeInterval = setInterval(() => {
      track.volume = Math.min(tv, track.volume + 0.03);
      if (track.volume >= tv - 0.01) { track.volume = tv; clearInterval(music.fadeInterval); music.fadeInterval = null; }
    }, 25);
    music.current = track; music.currentName = name;
  }
}
function stopMusic() {
  if (music.fadeInterval) clearInterval(music.fadeInterval);
  if (music.current) { music.current.pause(); music.current.currentTime = 0; }
  music.current = null; music.currentName = '';
}
function updateMusicVolume() {
  if (music.current) music.current.volume = getMusicVol();
}

// --- SETTINGS OVERLAY ---
const settingsState = { open: false, cursor: 0, codeMode: false, codeText: '', codeMsg: '', codeMsgTimer: 0, codeMsgOk: false };
const SETTINGS_ITEMS = ['musicVolume', 'sfxVolume', 'masterVolume'];
const SETTINGS_LABELS = ['Música', 'Efectos', 'Master'];
function toggleSettings() { settingsState.open = !settingsState.open; settingsState.cursor = 0; settingsState.codeMode = false; settingsState.codeText = ''; settingsState.codeMsg = ''; settingsState.codeMsgTimer = 0; settingsState.codeMsgOk = false; sfxSelect(); }
function updateSettings() {
  if (!settingsState.open) return false;
  // Code input mode
  if (settingsState.codeMode) {
    if (settingsState.codeMsgTimer > 0) {
      settingsState.codeMsgTimer--;
      if (settingsState.codeMsgTimer <= 0) { settingsState.codeMsg = ''; }
      if (isJustPressed('Escape') || isJustPressed('Enter')) { settingsState.codeMsgTimer = 0; settingsState.codeMsg = ''; }
      return true;
    }
    if (isJustPressed('Escape')) { settingsState.codeMode = false; return true; }
    if (isJustPressed('Enter')) {
      if (settingsState.codeText.length > 0) {
        const result = redeemCode(settingsState.codeText);
        settingsState.codeMsg = result.msg;
        settingsState.codeMsgOk = result.ok;
        settingsState.codeMsgTimer = 120;
        settingsState.codeText = '';
        if (result.ok) { sfxVictory(); saveGame(); } else { sfxDamage(); }
      }
      return true;
    }
    if (isJustPressed('Backspace')) { settingsState.codeText = settingsState.codeText.slice(0, -1); return true; }
    // Capture letter keys
    for (const k of Object.keys(justPressed)) {
      if (justPressed[k] && k.length === 1 && /[a-zA-Z0-9]/.test(k) && settingsState.codeText.length < 12) {
        settingsState.codeText += k.toUpperCase();
      }
    }
    return true;
  }
  if (isJustPressed('Escape') || isJustPressed('o') || isJustPressed('O')) { toggleSettings(); return true; }
  if (isJustPressed('ArrowUp')) { settingsState.cursor = (settingsState.cursor - 1 + 4) % 4; sfxCursor(); }
  if (isJustPressed('ArrowDown')) { settingsState.cursor = (settingsState.cursor + 1) % 4; sfxCursor(); }
  if (settingsState.cursor < 3) {
    const key = SETTINGS_ITEMS[settingsState.cursor];
    if (keys['ArrowLeft']) { audioSettings[key] = Math.max(0, audioSettings[key] - 0.02); updateMusicVolume(); saveAudioSettings(); }
    if (keys['ArrowRight']) { audioSettings[key] = Math.min(1, audioSettings[key] + 0.02); updateMusicVolume(); saveAudioSettings(); }
  } else {
    // Gift code option - press Enter to activate
    if (isJustPressed('Enter') || isJustPressed(' ') || isJustPressed('z') || isJustPressed('Z')) {
      settingsState.codeMode = true;
      settingsState.codeText = '';
      settingsState.codeMsg = '';
      sfxSelect();
    }
  }
  return true;
}
function drawSettings() {
  if (!settingsState.open) return;
  vctx.fillStyle = 'rgba(0,0,0,0.75)';
  vctx.fillRect(0, 0, VIRT_W, VIRT_H);

  if (settingsState.codeMode) {
    // --- GIFT CODE INPUT SCREEN ---
    const bx = 20, by = 50, bw = VIRT_W - 40, bh = 120;
    drawBox(vctx, bx, by, bw, bh, '#0A0A2A', '#AA8844');
    drawText(vctx, 'CÓDIGO DE REGALO', bx + 38, by + 8, PAL.gold, 10);

    drawText(vctx, 'Escribe un código:', bx + 12, by + 30, PAL.white, 8);
    // Input box
    const ibx = bx + 12, iby = by + 44, ibw = bw - 24, ibh = 16;
    vctx.fillStyle = '#111133';
    vctx.fillRect(ibx, iby, ibw, ibh);
    vctx.strokeStyle = '#6688CC';
    vctx.strokeRect(ibx + 0.5, iby + 0.5, ibw, ibh);
    // Text + blinking cursor
    const displayText = settingsState.codeText + (Math.floor(game.tick / 15) % 2 ? '_' : '');
    drawText(vctx, displayText, ibx + 4, iby + 4, '#44AAFF', 9);

    // Message display
    if (settingsState.codeMsg) {
      const msgColor = settingsState.codeMsgOk ? '#44FF88' : '#FF4444';
      const msgLines = wrapText(settingsState.codeMsg, 28);
      msgLines.forEach((line, i) => {
        drawText(vctx, line, bx + 12, by + 68 + i * 12, msgColor, 8);
      });
    }

    drawText(vctx, 'ENTER Canjear  ESC Volver', bx + 20, by + bh - 14, PAL.darkGray, 7);
    return;
  }

  const bx = 30, by = 35, bw = VIRT_W - 60, bh = 125;
  drawBox(vctx, bx, by, bw, bh, '#0A0A2A', '#6688CC');
  drawText(vctx, 'CONFIGURACIÓN', bx + 42, by + 6, PAL.gold, 10);
  SETTINGS_ITEMS.forEach((key, i) => {

function initAudio() { if (!audioCtx) { audioCtx = new AudioCtx(); loadMusic(); } }
function getSfxVol() { return audioSettings.sfxVolume * audioSettings.masterVolume; }
function playTone(freq, dur, type = 'square', vol = 0.1) {
  if (!audioCtx) return;
  const v = vol * getSfxVol(); if (v < 0.001) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function noiseBuffer(dur) {
  const sr = audioCtx.sampleRate, len = sr * dur, buf = audioCtx.createBuffer(1, len, sr), d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function sfxVictory() {
  if (!audioCtx) return; const v = getSfxVol();
  [523,523,523,659,784,659,784,1047].forEach((f,i) => setTimeout(() => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type='square'; o.frequency.value=f;
    g.gain.setValueAtTime(v*0.08, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.2);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.25);
  }, i*140));
}
// Floating damage numbers system
const floatingTexts = [];
function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 45, maxLife: 45 });
}
function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y -= 0.5;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    vctx.globalAlpha = Math.min(1, ft.life / 15);
    drawText(vctx, ft.text, ft.x, ft.y, ft.color, 9);
  });
  vctx.globalAlpha = 1;
}

// --- SISTEMA DE INPUT ---
const keys = {};
const justPressed = {};
document.addEventListener('keydown', e => {
  if (!keys[e.key]) justPressed[e.key] = true;
  keys[e.key] = true;
  e.preventDefault();
  initAudio();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
function isJustPressed(key) {
  if (justPressed[key]) { justPressed[key] = false; return true; }
  return false;
}
function clearJustPressed() {
  for (const k in justPressed) justPressed[k] = false;
}

// --- UTILIDADES ---
let fontReady = false;
document.fonts.ready.then(() => { fontReady = true; });

function drawText(ctx, text, x, y, color = PAL.white, size = 8) {
  const ff = fontReady ? '"Press Start 2P",' : '';
  ctx.font = size + 'px ' + ff + ' monospace';
  ctx.textBaseline = 'top';
  // Drop shadow for readability
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillText(text, x + 1, y + 1);
  // Main text
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function drawBox(ctx, x, y, w, h, fill = '#0A0A30', border = '#4466AA') {
  // FF4-style box with double border and gradient feel
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w, h);
  // Outer border
  ctx.strokeStyle = '#222244';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  // Main border
  ctx.strokeStyle = border;
  ctx.strokeRect(x + 1.5, y + 1.5, w - 3, h - 3);
  // Inner highlight
  ctx.strokeStyle = '#8899CC';
  ctx.strokeRect(x + 2.5, y + 2.5, w - 5, h - 5);
  // Corner accents
  ctx.fillStyle = '#AABBDD';
  ctx.fillRect(x + 2, y + 2, 1, 1);
  ctx.fillRect(x + w - 3, y + 2, 1, 1);
  ctx.fillRect(x + 2, y + h - 3, 1, 1);
  ctx.fillRect(x + w - 3, y + h - 3, 1, 1);
}

function wrapText(text, maxChars) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    if ((line + ' ' + word).trim().length > maxChars) {
      if (line) lines.push(line);
      line = word;
    } else {
      line = line ? line + ' ' + word : word;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// --- SPRITE FACTORY ---
// Sprites generados proceduralmente como ImageData sobre tiny canvases
const spriteCache = {};

function createSprite(w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;
  drawFn(cx, w, h);
  return c;
}

function px(ctx, x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 1, 1);
}

function rect(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

// --- GENERADOR DE SPRITES DE PERSONAJES (16x16 overworld) ---
function makeCharSprite(skin, hairColor, hasBeard, bodyColor, pantsColor, isBald, extraFn) {
  return createSprite(16, 64, (ctx, w, h) => {
    // 4 frames: down, left, right, up
    for (let f = 0; f < 4; f++) {
      const oy = f * 16;
      // Cabeza con mejor proporción
      if (isBald) {
        rect(ctx, 5, oy + 1, 6, 6, skin);
        // Brillo calva (specular)
        px(ctx, 6, oy + 1, '#FFE8CC');
        px(ctx, 7, oy + 1, '#FFE8CC');
        px(ctx, 8, oy + 2, '#FFD8BB');
      } else {
        rect(ctx, 5, oy + 0, 6, 2, hairColor);
        rect(ctx, 5, oy + 2, 6, 5, skin);
        px(ctx, 4, oy + 1, hairColor);
        px(ctx, 11, oy + 1, hairColor);
        // Hair depth
        px(ctx, 5, oy, '#000000'); px(ctx, 10, oy, '#000000');
      }
      // Skin shading
      px(ctx, 10, oy + 4, '#D4A870');
      // Ojos y cara
      if (f === 0) { // Abajo (mirando al jugador)
        // Eye whites
        px(ctx, 6, oy + 3, '#FFFFFF');
        px(ctx, 9, oy + 3, '#FFFFFF');
        // Pupils
        px(ctx, 6, oy + 4, PAL.black);
        px(ctx, 9, oy + 4, PAL.black);
        // Nose
        px(ctx, 8, oy + 4, '#D4A870');
        // Mouth
        px(ctx, 7, oy + 5, '#CC8866');
        px(ctx, 8, oy + 5, '#CC8866');
        if (hasBeard) {
          rect(ctx, 6, oy + 5, 4, 2, PAL.beard);
          px(ctx, 5, oy + 5, PAL.beard);
          px(ctx, 10, oy + 5, PAL.beard);
          px(ctx, 5, oy + 6, PAL.beard);
          px(ctx, 10, oy + 6, PAL.beard);
        }
      } else if (f === 1) { // Izquierda
        px(ctx, 5, oy + 3, '#FFFFFF');
        px(ctx, 5, oy + 4, PAL.black);
        px(ctx, 6, oy + 5, '#CC8866');
      } else if (f === 2) { // Derecha
        px(ctx, 10, oy + 3, '#FFFFFF');
        px(ctx, 10, oy + 4, PAL.black);
        px(ctx, 9, oy + 5, '#CC8866');
      } else { // Arriba
        if (!isBald) rect(ctx, 5, oy + 0, 6, 4, hairColor);
        else {
          rect(ctx, 5, oy + 1, 6, 5, skin);
          px(ctx, 6, oy + 1, '#FFE8CC');
          px(ctx, 7, oy + 2, '#FFD8BB');
        }
      }
      // Cuerpo con sombreado
      rect(ctx, 4, oy + 7, 8, 5, bodyColor);
      // Body shading (left side shadow)
      px(ctx, 4, oy + 8, '#00000022');
      px(ctx, 4, oy + 9, '#00000022');
      // Arms
      rect(ctx, 3, oy + 7, 1, 4, bodyColor);
      rect(ctx, 12, oy + 7, 1, 4, bodyColor);
      // Cinturón con hebilla
      rect(ctx, 4, oy + 11, 8, 1, PAL.brown);
      px(ctx, 8, oy + 11, PAL.gold);
      // Piernas
      rect(ctx, 5, oy + 12, 3, 3, pantsColor);
      rect(ctx, 9, oy + 12, 3, 3, pantsColor);
      // Piernas shadow
      px(ctx, 5, oy + 13, '#00000015');
      px(ctx, 9, oy + 13, '#00000015');
      // Botas con detalle
      rect(ctx, 5, oy + 14, 3, 2, PAL.darkBrown);
      rect(ctx, 9, oy + 14, 3, 2, PAL.darkBrown);
      // Boot highlight
      px(ctx, 6, oy + 14, '#6B4A22');
      px(ctx, 10, oy + 14, '#6B4A22');
      // Extra (armas, detalles)
      if (extraFn) extraFn(ctx, f, oy);
    }
  });
}

// --- TILES DEL MAPA ---
const tileSprites = {};

function generateTiles() {
  // === HIERBA (detallada con dithering) ===
  tileSprites.grass = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#3A8840');
    // Dithering pattern
    for (let y = 0; y < 16; y += 2) for (let x = (y/2)%2; x < 16; x += 2) px(ctx, x, y, '#348038');
    // Grass blades
    for (let i = 0; i < 6; i++) {
      const gx = (i*3+1)%15, gy = (i*5+2)%14;
      px(ctx, gx, gy, '#4AA050'); px(ctx, gx, gy+1, '#2A6830');
    }
    px(ctx, 4, 8, '#56B860'); px(ctx, 11, 3, '#56B860');
  });
  tileSprites.grass2 = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#3A8840');
    for (let y = 0; y < 16; y += 2) for (let x = ((y/2)+1)%2; x < 16; x += 2) px(ctx, x, y, '#2E7234');
    // Flowers on grass
    px(ctx, 4, 5, '#FF6688'); px(ctx, 5, 5, '#FF6688'); px(ctx, 4, 4, '#FFAACC');
    px(ctx, 11, 9, '#FFEE44'); px(ctx, 12, 9, '#FFEE44'); px(ctx, 11, 8, '#FFFFAA');
    px(ctx, 7, 12, '#56B860');
  });

  // === CAMINO (texturizado) ===
  tileSprites.path = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#C4A060');
    for (let y = 0; y < 16; y += 2) for (let x = (y/2)%2; x < 16; x += 2) px(ctx, x, y, '#B89050');
    // Stones
    px(ctx, 3, 6, '#A08040'); px(ctx, 10, 3, '#A08040'); px(ctx, 7, 12, '#A08040');
    px(ctx, 13, 9, '#D4B070'); px(ctx, 1, 13, '#D4B070');
  });

  // === AGUA (con reflejos animados) ===
  tileSprites.water = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#2266AA');
    for (let y = 0; y < 16; y += 2) for (let x = (y/2)%2; x < 16; x += 3) px(ctx, x, y, '#1A5588');
    // Wave highlights
    rect(ctx, 2, 4, 5, 1, '#44AADD'); rect(ctx, 10, 10, 4, 1, '#44AADD');
    rect(ctx, 6, 14, 3, 1, '#66BBEE');
    px(ctx, 1, 8, '#3388BB'); px(ctx, 13, 2, '#3388BB');
  });

  // === MURO PIEDRA (con grietas y textura) ===
  tileSprites.stoneWall = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#888899');
    // Mortar lines
    ctx.fillStyle = '#666677';
    for (let y = 0; y < 16; y += 4) { ctx.fillRect(0, y, 16, 1); }
    for (let x = 0; x < 16; x += 8) { ctx.fillRect(x, 0, 1, 4); ctx.fillRect(x+4, 4, 1, 4); ctx.fillRect(x, 8, 1, 4); ctx.fillRect(x+4, 12, 1, 4); }
    // Highlights & shadows
    for (let y = 1; y < 16; y += 4) { px(ctx, 1, y, '#9999AA'); px(ctx, 5, y+4>15?y:y+4, '#7777888'); }
    px(ctx, 3, 6, '#777788'); px(ctx, 12, 2, '#999AAA');
  });

  // === ÁRBOL (mucho más detallado) ===
  tileSprites.tree = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#3A8840'); // Base grass
    for (let y = 0; y < 16; y += 2) for (let x = (y/2)%2; x < 16; x += 2) px(ctx, x, y, '#348038');

  tileSprites.floor = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#C4A870');
    for (let x = 0; x < 16; x += 8) for (let y = 0; y < 16; y += 8) {
      ctx.strokeStyle = '#B09860'; ctx.lineWidth = 1;

    }

  // === SUELO CUEVA (rocoso) ===
  tileSprites.caveFloor = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#3A3A4A');
    for (let y = 0; y < 16; y += 2) for (let x = (y/2)%2; x < 16; x += 3) px(ctx, x, y, '#2E2E3E');

    px(ctx, 2, 11, '#50506A');
  });

  // === PARED CUEVA (rugosa) ===
  tileSprites.caveWall = createSprite(16, 16, (ctx) => {
    rect(ctx, 0, 0, 16, 16, '#2A2A3A');
    // Rock texture
    for (let y = 0; y < 16; y += 3) for (let x = (y/3)%2*2; x < 16; x += 4) {

    // Highlights

    function corridor(x1, y1, x2, y2) {
      const dx = Math.sign(x2 - x1), dy = Math.sign(y2 - y1);

      while (x !== x2 || y !== y2) {
        m[y][x] = T.CAVE_FLOOR;
        if (x > 0) m[y][x - 1] = T.CAVE_FLOOR;
        if (x < 19) m[y][x + 1] = T.CAVE_FLOOR;
        if (x !== x2) x += dx;
        else if (y !== y2) y += dy;
      }
      m[y2][x2] = T.CAVE_FLOOR;
    }
    // Entrada
    m[1][7] = T.CAVE_FLOOR; m[1][8] = T.CAVE_FLOOR;
    corridor(7, 1, 7, 6);

    corridor(10, 10, 10, 6);

    corridor(10, 12, 10, 18);
    corridor(10, 18, 5, 18);
    corridor(5, 18, 5, 22);

    return m;

const GIFT_CODES = {
  'GOJO': { char: 'gojo', msg: '¡Gojo Satoru se une al grupo! El hechicero más fuerte.' },
  'SUKUNA': { char: 'sukuna', msg: '¡Ryomen Sukuna se une al grupo! El Rey de las Maldiciones.' },
};
function redeemCode(code) {
  const c = code.trim().toUpperCase();
  if (!GIFT_CODES[c]) return { ok: false, msg: 'Código no válido' };
  const gift = GIFT_CODES[c];
  if (game.flags['code_' + c]) return { ok: false, msg: 'Ya has canjeado este código' };
  if (gift.char === 'gojo') addGojo();
  if (gift.char === 'sukuna') addSukuna();
  game.flags['code_' + c] = true;
  return { ok: true, msg: gift.msg };
}

// --- SISTEMA DE EXPLORACIÓN ---
function movePlayer(dx, dy) {
  if (game.moveDelay > 0) return;
  const newDir = dx < 0 ? 1 : dx > 0 ? 2 : dy < 0 ? 3 : 0;
  game.player.dir = newDir;

  const nx = game.player.x + dx;
  const ny = game.player.y + dy;
  const map = maps[game.currentMap];

  // Límites
  if (nx < 0 || ny < 0 || nx >= map.width || ny >= map.height) return;

  // Colisión con tiles
  const tile = map.data[ny][nx];
  if (solidTiles.has(tile)) return;

  // Colisión con NPCs
  const npc = map.npcs.find(n => n.x === nx && n.y === ny && !game.flags[n.id + '_gone']);
  if (npc) return;

  game.player.x = nx;
  game.player.y = ny;
  game.player.stepCount++;
  game.moveDelay = 8;

  // Check triggers
  checkTriggers();

  // Random encounters
  if (map.encounterRate > 0 && game.player.stepCount % 4 === 0) {
    if (Math.random() * 100 < map.encounterRate) {
      const table = map.music === 'forest' ? encounterTables.forest : encounterTables.cave;
      if (table) {
        const totalWeight = table.reduce((s, e) => s + e.weight, 0);
        let roll = Math.random() * totalWeight;
        for (const enc of table) {
          roll -= enc.weight;
          if (roll <= 0) {
            startBattle(enc.enemies, false);
            break;
          }
        }
      }
    }
  }
}

function checkTriggers() {
  const map = maps[game.currentMap];
  for (const trigger of map.triggers) {
    if (game.player.x === trigger.x && game.player.y === trigger.y) {
      if (trigger.type === 'mapChange') {
        if (trigger.target === 'forest' && !game.flags.questStarted) {
          startDialogue([
            { speaker: 'Javier', text: 'No tengo motivos para ir al bosque ahora. Debería hablar con la gente del pueblo.' },
          ]);
          game.player.y--;
          return;
        }
        if (trigger.target === 'cave' && !game.flags.pauJoined) {
          startDialogue([
            { speaker: 'Javier', text: 'Esta cueva parece peligrosa. Debería buscar más aliados primero.' },
          ]);
          game.player.y--;
          return;
        }
        changeMap(trigger.target, trigger.tx, trigger.ty);
      } else if (trigger.type === 'bossTrigger') {
        if (!game.flags.bossDefeated && !game.flags.bossTriggered) {
          game.flags.bossTriggered = true;
          startDialogue(getDialogue('boss_intro'));
        }
      }
    }
  }
}

function changeMap(mapId, px, py) {
  game.transition = { type: 'fadeOut', timer: 20, target: mapId, px, py };
}

function interact() {
  const map = maps[game.currentMap];
  const dx = [0, -1, 1, 0][game.player.dir];
  const dy = [1, 0, 0, -1][game.player.dir];
  const tx = game.player.x + dx;
  const ty = game.player.y + dy;

  // Check NPCs
  for (const npc of map.npcs) {
    if (npc.x === tx && npc.y === ty && !game.flags[npc.id + '_gone']) {
      // NPC mira al jugador
      npc.dir = game.player.dir === 0 ? 3 : game.player.dir === 3 ? 0 : game.player.dir === 1 ? 2 : 1;
      startDialogue(getDialogue(npc.id));
      return;
    }
  }

  // Check tiles
  const tile = map.data[ty]?.[tx];
  if (tile === T.SIGN) {
    startDialogue(getDialogue('sign_village'));
  } else if (tile === T.CHEST) {
    startDialogue(getDialogue('chest_cave'));
  }
}

// --- SISTEMA DE DIÁLOGOS ---
function startDialogue(lines) {
  game.state = 'dialogue';
  game.dialogue = {
    lines: lines,
    currentLine: 0,
    charIndex: 0,
    charTimer: 0,
    complete: false,
  };
  sfxSelect();
}

function updateDialogue() {
  const d = game.dialogue;
  if (!d) return;

  const line = d.lines[d.currentLine];
  if (!line) { endDialogue(); return; }

  if (!d.complete) {
    d.charTimer++;
    if (d.charTimer >= 2) {
      d.charTimer = 0;
      d.charIndex++;
      if (d.charIndex >= line.text.length) {
        d.complete = true;
      }
    }
  }

  if (isJustPressed(' ') || isJustPressed('Enter')) {
    if (!d.complete) {
      d.charIndex = line.text.length;
      d.complete = true;
    } else {
      // Execute action if any
      if (line.action) line.action();
      d.currentLine++;
      d.charIndex = 0;
      d.charTimer = 0;
      d.complete = false;
      sfxSelect();

      if (d.currentLine >= d.lines.length) {
        endDialogue();
      }
    }
  }
}

function endDialogue() {
  game.dialogue = null;
  if (game.state === 'dialogue') game.state = 'explore';
}

function drawDialogue() {
  const d = game.dialogue;
  if (!d || d.currentLine >= d.lines.length) return;
  const line = d.lines[d.currentLine];

  const boxY = VIRT_H - 52;
  drawBox(vctx, 4, boxY, VIRT_W - 8, 48);

  if (line.speaker) {
    drawText(vctx, line.speaker, 10, boxY + 4, PAL.cyan, 8);
    const displayText = line.text.substring(0, d.charIndex);
    const wrapped = wrapText(displayText, 30);
    wrapped.forEach((l, i) => {
      drawText(vctx, l, 10, boxY + 14 + i * 10, PAL.white, 8);
    });
  } else {
    const displayText = line.text.substring(0, d.charIndex);
    const wrapped = wrapText(displayText, 30);
    wrapped.forEach((l, i) => {
      drawText(vctx, l, 10, boxY + 10 + i * 10, PAL.yellow, 8);
    });
  }

  if (d.complete) {
    const blink = Math.floor(game.tick / 15) % 2;
    if (blink) drawText(vctx, '▼', VIRT_W - 18, boxY + 40, PAL.white, 8);
  }
}

// --- SISTEMA DE BATALLA ---
function startBattle(enemyIds, isBoss) {
  initAudio();
  playMusic('battle');
  game.state = 'battle';
  const enemies = enemyIds.map((id, i) => ({
    ...JSON.parse(JSON.stringify(ENEMIES[id])),
    index: i,
    alive: true,
    atbGauge: Math.random() * 30,
    atbMax: 100,
    isEnemy: true,
    buffAtk: 0, buffDef: 0,
  }));

  const partyBattle = game.party.filter(p => p.hp > 0).map((p, i) => ({
    ...p,
    index: i,
    alive: p.hp > 0,
    atbGauge: Math.random() * 20,
    atbMax: 100,
    isEnemy: false,
    buffAtk: 0, buffDef: 0,
    defending: false,
  }));

  game.battle = {
    party: partyBattle,
    enemies: enemies,
    isBoss: isBoss,
    state: 'atb', // atb, selectAction, selectTarget, selectSkill, selectItem, animAttack, animMagic, enemyTurn, victory, defeat
    activeChar: null,
    cursor: 0,
    actionMenu: ['Atacar', 'Magia', 'Objeto', 'Defender'],
    targetCursor: 0,
    skillCursor: 0,
    itemCursor: 0,
    message: '',
    messageTimer: 0,
    animTimer: 0,
    animTarget: null,
    animType: '',
    turnOrder: [],
    victoryTimer: 0,
    totalExp: 0,
    totalGil: 0,
    flashTimer: 0,
    flashColor: '',
    shakeTimer: 0,
    particles: [],
  };
  playTone(200, 0.3, 'sawtooth', 0.08);
}

function updateBattle() {
  const b = game.battle;
  if (!b) return;

  b.particles = b.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.life--;
    p.vx *= 0.98;
    return p.life > 0;
  });
  updateFloatingTexts();

  if (b.flashTimer > 0) b.flashTimer--;
  if (b.shakeTimer > 0) b.shakeTimer--;

  if (b.messageTimer > 0) {
    b.messageTimer--;
    if (b.messageTimer <= 0) {
      if (b.state === 'animAttack' || b.state === 'animMagic') {
        // Check if battle over
        if (b.enemies.every(e => !e.alive)) {
          battleVictory();
          return;
        }
        if (b.party.every(p => !p.alive)) {
          battleDefeat();
          return;
        }
        b.state = 'atb';
      } else if (b.state === 'enemyTurn') {
        if (b.party.every(p => !p.alive)) {
          battleDefeat();
          return;
        }
        b.state = 'atb';
      }
    }
    return;
  }

  if (b.state === 'victory') {
    b.victoryTimer++;
    if (b.victoryTimer === 1) { sfxVictory(); }
    if (isJustPressed(' ') || isJustPressed('Enter')) {
      if (b.victoryTimer > 30) {
        // Apply rewards
        b.party.forEach(p => {
          const real = game.party.find(r => r.id === p.id);
          if (real && p.alive) {
            real.hp = p.hp;
            real.mp = p.mp;
            real.exp += b.totalExp;
            // Level up check
            while (real.exp >= real.nextExp) {
              real.level++;
              real.exp -= real.nextExp;
              real.nextExp = Math.floor(real.nextExp * 1.3);
              real.maxHp += 8 + Math.floor(Math.random() * 5);
              real.maxMp += 3 + Math.floor(Math.random() * 3);
              real.atk += 1 + Math.floor(Math.random() * 2);
              real.def += 1 + Math.floor(Math.random() * 2);
              real.spd += Math.floor(Math.random() * 2);
              real.mag += Math.floor(Math.random() * 2);
              real.hp = real.maxHp;
              real.mp = real.maxMp;
            }
          }
        });
        game.gil += b.totalGil;

        if (b.isBoss) {
          game.flags.bossDefeated = true;
          game.state = 'victory';
          game.battle = null;
          playMusic('menu');
        } else {
          game.state = 'explore';
          game.battle = null;
          playMusic('world');
        }
      }
    }
    return;
  }

  if (b.state === 'defeat') {
    if (isJustPressed(' ') || isJustPressed('Enter')) {
      game.state = 'gameover';
      game.battle = null;
      playMusic('menu');
    }
    return;
  }

  // ATB phase
  if (b.state === 'atb') {
    // Update ATB gauges
    const allUnits = [...b.party.filter(p => p.alive), ...b.enemies.filter(e => e.alive)];
    for (const unit of allUnits) {
      unit.atbGauge += unit.spd * 0.5;
      if (unit.atbGauge >= unit.atbMax) {
        unit.atbGauge = unit.atbMax;
        if (unit.isEnemy) {
          executeEnemyTurn(unit);
          return;
        } else {
          b.activeChar = unit;
          b.state = 'selectAction';
          b.cursor = 0;
          return;
        }
      }
    }
  }

  // Action selection
  if (b.state === 'selectAction') {
    if (isJustPressed('ArrowUp')) { b.cursor = (b.cursor - 1 + 4) % 4; sfxCursor(); }
    if (isJustPressed('ArrowDown')) { b.cursor = (b.cursor + 1) % 4; sfxCursor(); }
    if (isJustPressed(' ') || isJustPressed('Enter')) {
      sfxSelect();
      switch (b.cursor) {
        case 0: // Atacar
          b.state = 'selectTarget';
          b.targetCursor = b.enemies.findIndex(e => e.alive);
          break;
        case 1: // Magia
          if (b.activeChar.skills && b.activeChar.skills.length > 0) {
            b.state = 'selectSkill';
            b.skillCursor = 0;
          }
          break;
        case 2: // Objeto
          if (game.items.length > 0) {
            b.state = 'selectItem';
            b.itemCursor = 0;
          }
          break;
        case 3: // Defender
          b.activeChar.defending = true;
          b.activeChar.atbGauge = 0;
          b.message = b.activeChar.name + ' se defiende.';
          b.messageTimer = 40;
          b.state = 'atb';
          break;
      }
    }
  }

  // Target selection
  if (b.state === 'selectTarget') {
    const aliveEnemies = b.enemies.filter(e => e.alive);
    if (isJustPressed('ArrowUp') || isJustPressed('ArrowLeft')) {
      const idx = aliveEnemies.findIndex(e => e.index === b.targetCursor);
      const newIdx = (idx - 1 + aliveEnemies.length) % aliveEnemies.length;
      b.targetCursor = aliveEnemies[newIdx].index;
      sfxCursor();
    }
    if (isJustPressed('ArrowDown') || isJustPressed('ArrowRight')) {
      const idx = aliveEnemies.findIndex(e => e.index === b.targetCursor);
      const newIdx = (idx + 1) % aliveEnemies.length;
      b.targetCursor = aliveEnemies[newIdx].index;
      sfxCursor();
    }
    if (isJustPressed('Escape') || isJustPressed('Backspace')) {
      if (b._skillMode) { b._skillMode = false; b.activeChar.mp += b.selectedSkill.cost; }
      b.state = 'selectAction';
    }
    if (isJustPressed(' ') || isJustPressed('Enter')) {
      const target = b.enemies[b.targetCursor];
      if (b._skillMode) {
        b._skillMode = false;
        executeSkill(b.activeChar, b.selectedSkill, target);
      } else {
        executeAttack(b.activeChar, target);
      }
    }
  }

  // Skill selection
  if (b.state === 'selectSkill') {
    const skills = b.activeChar.skills;
    if (isJustPressed('ArrowUp')) { b.skillCursor = (b.skillCursor - 1 + skills.length) % skills.length; sfxCursor(); }
    if (isJustPressed('ArrowDown')) { b.skillCursor = (b.skillCursor + 1) % skills.length; sfxCursor(); }
    if (isJustPressed('Escape') || isJustPressed('Backspace')) { b.state = 'selectAction'; }
    if (isJustPressed(' ') || isJustPressed('Enter')) {
      const skill = skills[b.skillCursor];
      if (b.activeChar.mp >= skill.cost) {
        b.activeChar.mp -= skill.cost;
        if (skill.target === 'enemy') {
          // Select enemy target
          b.selectedSkill = skill;
          b.state = 'selectTarget';
          b.targetCursor = b.enemies.findIndex(e => e.alive);
          // Override the selectTarget confirm behavior
          b._skillMode = true;
        } else if (skill.target === 'ally') {
          // Select ally target
          b.selectedSkill = skill;
          b.state = 'selectAllyTarget';
          b.targetCursor = 0;
        } else if (skill.target === 'party') {
          executeSkill(b.activeChar, skill, null);
        }
      } else {
        b.message = '¡MP insuficiente!';
        b.messageTimer = 30;
      }
      sfxSelect();
    }
  }

  // Ally target selection (for heals)
  if (b.state === 'selectAllyTarget') {
    const alive = b.party.filter(p => p.alive);
    if (isJustPressed('ArrowUp')) { b.targetCursor = (b.targetCursor - 1 + b.party.length) % b.party.length; sfxCursor(); }
    if (isJustPressed('ArrowDown')) { b.targetCursor = (b.targetCursor + 1) % b.party.length; sfxCursor(); }
    if (isJustPressed('Escape') || isJustPressed('Backspace')) {
      if (b._itemMode) { b._itemMode = false; b.state = 'selectItem'; }
      else { b.state = 'selectSkill'; b.activeChar.mp += b.selectedSkill.cost; }
    }
    if (isJustPressed(' ') || isJustPressed('Enter')) {
      if (b._itemMode) {
        const item = b.selectedItem;
        b._itemMode = false;
        useItem(item, b.party[b.targetCursor]);
      } else {
        executeSkill(b.activeChar, b.selectedSkill, b.party[b.targetCursor]);
      }
    }
  }

  // Item selection
  if (b.state === 'selectItem') {
    const items = game.items.filter(i => i.count > 0);
    if (items.length === 0) { b.state = 'selectAction'; return; }
    if (isJustPressed('ArrowUp')) { b.itemCursor = (b.itemCursor - 1 + items.length) % items.length; sfxCursor(); }
    if (isJustPressed('ArrowDown')) { b.itemCursor = (b.itemCursor + 1) % items.length; sfxCursor(); }
    if (isJustPressed('Escape') || isJustPressed('Backspace')) { b.state = 'selectAction'; }
    if (isJustPressed(' ') || isJustPressed('Enter')) {
      b.selectedItem = items[b.itemCursor];
      b.state = 'selectAllyTarget';
      b.targetCursor = 0;
      b._itemMode = true;
      sfxSelect();
    }
  }

}

function executeAttack(attacker, target) {
  const b = game.battle;
  const atk = attacker.atk + attacker.buffAtk;
  const def = target.def + target.buffDef + (target.defending ? 10 : 0);
  let damage = Math.max(1, atk * 2 - def + Math.floor(Math.random() * 6));

  target.hp = Math.max(0, target.hp - damage);
  if (target.hp <= 0) target.alive = false;

  b.message = attacker.name + ' ataca a ' + target.name + '! ' + damage + ' daño';
  b.messageTimer = 50;
  b.state = 'animAttack';
  b.animTarget = target;
  b.animType = 'physical';
  attacker.atbGauge = 0;
  attacker.defending = false;
  b.flashTimer = 8;
  b.flashColor = PAL.white;
  b.shakeTimer = 8;

  sfxSwordSlash();

  // Floating damage number
  const tx = target.isEnemy ? 50 + target.index * 45 + 10 : 195;
  const ty = target.isEnemy ? 40 + target.index * 25 : 30 + target.index * 35;
  addFloatingText(tx, ty - 5, '-' + damage, PAL.white);

  // Enhanced slash particles
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    b.particles.push({
      x: tx, y: ty + 15,
      vx: Math.cos(angle) * (1.5 + Math.random() * 2),
      vy: Math.sin(angle) * (1.5 + Math.random() * 2),
      life: 18 + Math.random() * 12,
      color: i % 2 === 0 ? PAL.white : PAL.lightGray,
      size: 1 + Math.random(),
    });
  }
}

function executeSkill(caster, skill, target) {
  const b = game.battle;
  caster.atbGauge = 0;
  caster.defending = false;

  if (skill.type === 'physical' || skill.type === 'magic') {
    const atk = skill.type === 'magic' ? caster.mag : caster.atk;
    const def = target.def + target.buffDef + (target.defending ? 10 : 0);
    let damage = Math.max(1, skill.power + atk - def / 2 + Math.floor(Math.random() * 8));
    if (skill.type === 'magic') damage = Math.max(1, skill.power + caster.mag * 1.5 - target.def / 3);
    damage = Math.floor(damage);

    target.hp = Math.max(0, target.hp - damage);
    if (target.hp <= 0) target.alive = false;

    b.message = caster.name + ' usa ' + skill.name + '! ' + damage + ' daño';
    b.messageTimer = 55;
    b.state = 'animMagic';
    b.flashTimer = 14;
    b.shakeTimer = 6;

    sfxForSkill(skill.name);

    // Floating damage number
    const tdx = target.isEnemy ? 50 + target.index * 45 + 10 : 195;
    const tdy = target.isEnemy ? 40 + target.index * 25 : 30 + target.index * 35;
    // Floating damage number with JJK colors
    let floatColor = '#CC66FF';
    if (skill.name.includes('Fuego') || skill.name.includes('Flecha')) floatColor = '#FF6622';
    else if (skill.name.includes('Hielo')) floatColor = '#44CCFF';
    else if (skill.name.includes('Rayo')) floatColor = '#FFFF00';
    else if (skill.name.includes('蒼')) floatColor = '#4488FF';

    else if (skill.name.includes('茈')) floatColor = '#AA44FF';
    else if (skill.name.includes('Vacío')) floatColor = '#AADDFF';
    else if (skill.name.includes('Cleave') || skill.name.includes('Dismantle') || skill.name.includes('Fuga')) floatColor = '#FF3355';
    else if (skill.name.includes('Altar')) floatColor = '#FF1133';
    addFloatingText(tdx, tdy - 5, '-' + damage, floatColor);

    // Element-specific color + flash
    let pColor, pColor2;
    if (skill.name.includes('Fuego') || skill.name.includes('Flecha de Fuego')) { pColor = '#FF4400'; pColor2 = '#FF8800'; b.flashColor = '#FF440066'; }
    else if (skill.name.includes('Hielo')) { pColor = '#44CCFF'; pColor2 = '#AAEEFF'; b.flashColor = '#44CCFF66'; }
    else if (skill.name.includes('Rayo')) { pColor = '#FFFF00'; pColor2 = '#FFFF88'; b.flashColor = '#FFFF0066'; }
    // --- JJK SPECIAL COLORS ---
    else if (skill.name.includes('蒼')) { pColor = '#2266FF'; pColor2 = '#66AAFF'; b.flashColor = '#2266FF66'; }

    else if (skill.name.includes('Vacío Infinito')) { pColor = '#AACCFF'; pColor2 = '#FFFFFF'; b.flashColor = '#AACCFF88'; }
    else if (skill.name.includes('Cleave')) { pColor = '#FF3355'; pColor2 = '#FF8899'; b.flashColor = '#FF335566'; }
    else if (skill.name.includes('Dismantle') || skill.name.includes('Fuga')) { pColor = '#FF1133'; pColor2 = '#FF4466'; b.flashColor = '#FF113388'; }
    else if (skill.name.includes('Altar Maligno')) { pColor = '#880022'; pColor2 = '#FF3344'; b.flashColor = '#88002288'; }

    b.message = caster.name + ' usa ' + skill.name + '! +DEF para todos';
    b.messageTimer = 50;
    b.state = 'animMagic';
    sfxForSkill(skill.name);
    // Special Infinity animation for Gojo
    const isInfinity = skill.name.includes('Infinito');
    b.party.forEach((p, i) => {
      if (p.alive) {
        if (isInfinity) {

          for (let j = 0; j < 10; j++) {

}

function useItem(item, target) {
  const b = game.battle;
  b.activeChar.atbGauge = 0;

  if (item.effect === 'heal') {
    target.hp = Math.min(target.maxHp, target.hp + item.power);
    b.message = 'Usa ' + item.name + '! +' + item.power + ' HP';
    sfxHeal();
  } else if (item.effect === 'mp') {
    target.mp = Math.min(target.maxMp, target.mp + item.power);
    b.message = 'Usa ' + item.name + '! +' + item.power + ' MP';
    sfxHeal();
  } else if (item.effect === 'revive') {
    if (!target.alive) {
      target.alive = true;
      target.hp = item.power;
      b.message = 'Usa ' + item.name + '! ' + target.name + ' revive!';
    } else {
      b.message = target.name + ' ya está vivo.';
      return;
    }
    sfxHeal();
  } else if (item.effect === 'full') {
    target.hp = target.maxHp;
    target.mp = target.maxMp;
    b.message = 'Usa ' + item.name + '! Restauración total!';
    sfxHeal();
  }

  item.count--;
  if (item.count <= 0) {
    const idx = game.items.indexOf(item);
    if (idx >= 0) game.items.splice(idx, 1);
  }

  b.messageTimer = 50;
  b.state = 'animMagic';
}

function executeEnemyTurn(enemy) {
  const b = game.battle;
  const aliveParty = b.party.filter(p => p.alive);
  if (aliveParty.length === 0) return;

  const target = aliveParty[Math.floor(Math.random() * aliveParty.length)];

  // Choose between normal attack and skill
  const useSkill = enemy.skills && enemy.skills.length > 0 && Math.random() < 0.4;

  if (useSkill) {
    const skill = enemy.skills[Math.floor(Math.random() * enemy.skills.length)];
    let damage;
    if (skill.type === 'physical') {
      damage = Math.max(1, skill.power + enemy.atk - target.def - target.buffDef - (target.defending ? 10 : 0));
    } else if (skill.type === 'drain') {
      damage = Math.max(1, skill.power + enemy.mag - target.def / 2);
      enemy.hp = Math.min(enemy.maxHp, enemy.hp + Math.floor(damage / 2));
    } else {
      damage = Math.max(1, skill.power + enemy.mag - target.def / 3);
    }
    damage = Math.floor(damage + Math.random() * 4);

    target.hp = Math.max(0, target.hp - damage);
    if (target.hp <= 0) target.alive = false;

    b.message = enemy.name + ' usa ' + skill.name + '! ' + damage + ' daño a ' + target.name;
    b.flashTimer = 10;
    b.flashColor = '#FF4444';
    sfxForSkill(skill.name);
    addFloatingText(195, 30 + target.index * 35 - 5, '-' + damage, '#FF4444');
    for (let pi = 0; pi < 8; pi++) b.particles.push({
      x: 195 + (Math.random()-0.5)*15, y: 45 + target.index*35,
      vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
      life: 15 + Math.random()*10, color: pi%2?'#FF4444':'#FF8866', size: 1+Math.random(),
    });
  } else {
    const def = target.def + target.buffDef + (target.defending ? 10 : 0);
    let damage = Math.max(1, enemy.atk * 2 - def + Math.floor(Math.random() * 6));
    target.hp = Math.max(0, target.hp - damage);
    if (target.hp <= 0) target.alive = false;

    b.message = enemy.name + ' ataca a ' + target.name + '! ' + damage + ' daño';
    b.flashTimer = 8;
    b.flashColor = PAL.red;
    sfxDamage();
    addFloatingText(195, 30 + target.index * 35 - 5, '-' + damage, PAL.red);
    for (let pi = 0; pi < 6; pi++) b.particles.push({
      x: 195 + (Math.random()-0.5)*12, y: 45 + target.index*35,
      vx: (Math.random()-0.5)*2.5, vy: -Math.random()*2,
      life: 12 + Math.random()*8, color: PAL.red, size: 1,
    });
  }

  b.shakeTimer = 6;
  enemy.atbGauge = 0;
  b.messageTimer = 50;
  b.state = 'enemyTurn';
}

function battleVictory() {
  const b = game.battle;
  b.state = 'victory';
  b.victoryTimer = 0;
  b.totalExp = b.enemies.reduce((s, e) => s + e.exp, 0);
  b.totalGil = b.enemies.reduce((s, e) => s + e.gil, 0);
}

function battleDefeat() {
  const b = game.battle;
  b.state = 'defeat';
}

// --- DIBUJO DE BATALLA ---
function drawBattle() {
  const b = game.battle;
  if (!b) return;

  const shakeX = b.shakeTimer > 0 ? Math.floor(Math.random() * 4 - 2) : 0;
  const shakeY = b.shakeTimer > 0 ? Math.floor(Math.random() * 4 - 2) : 0;

  // === RICH BATTLE BACKGROUND ===
  const isCave = game.currentMap === 'cave';
  const isBoss = b.isBoss;
  // Gradient sky
  for (let y = 0; y < 100; y++) {
    const t = y / 100;
    let r, g, bl;
    if (isBoss) { r = Math.floor(30 + t * 20); g = Math.floor(5 + t * 10); bl = Math.floor(50 + t * 30); }
    else if (isCave) { r = Math.floor(15 + t * 20); g = Math.floor(15 + t * 20); bl = Math.floor(30 + t * 25); }
    else { r = Math.floor(5 + t * 15); g = Math.floor(15 + t * 30); bl = Math.floor(40 - t * 15); }
    vctx.fillStyle = `rgb(${r},${g},${bl})`;
    vctx.fillRect(0, y, VIRT_W, 1);
  }
  // Stars / cave stalactites
  if (!isCave) {
    for (let i = 0; i < 25; i++) {
      const sx = ((73 * (i+1) * 7 + 11) % VIRT_W);
      const sy = ((73 * (i+1) * 3 + 5) % 80);
      const br = Math.sin(game.tick * 0.04 + i * 1.7) * 0.4 + 0.6;
      vctx.fillStyle = `rgba(255,255,255,${br * 0.6})`;
      vctx.fillRect(sx, sy, 1, 1);
    }
  } else {
    vctx.fillStyle = '#1A1A28';
    for (let i = 0; i < 8; i++) {
      const sx = 15 + i * 32 + ((i * 7) % 10);
      const h = 8 + (i * 5) % 12;
      vctx.fillRect(sx, 0, 3, h);
      vctx.fillRect(sx - 1, 0, 5, h - 3);
    }
  }
  // Boss: swirling dark energy above
  if (isBoss) {
    const t = game.tick * 0.02;
    for (let i = 0; i < 6; i++) {
      const ox = Math.sin(t + i * 1.05) * 80 + 128;
      const oy = Math.cos(t + i * 1.3) * 30 + 30;
      vctx.fillStyle = `rgba(120,0,200,${0.15 + 0.1 * Math.sin(t + i)})`;
      vctx.beginPath(); vctx.arc(ox, oy, 8 + Math.sin(t+i)*3, 0, Math.PI*2); vctx.fill();
    }
  }
  // Ground plane with perspective stripes
  const groundTop = 100;
  for (let y = groundTop; y < 140; y++) {
    const t = (y - groundTop) / 40;
    let r, g, bl;
    if (isBoss) { r = Math.floor(45 + t * 15); g = Math.floor(20 + t * 10); bl = Math.floor(60 + t * 15); }
    else if (isCave) { r = Math.floor(35 + t * 15); g = Math.floor(35 + t * 12); bl = Math.floor(50 + t * 10); }
    else { r = Math.floor(20 + t * 25); g = Math.floor(55 + t * 20); bl = Math.floor(15 + t * 10); }
    vctx.fillStyle = `rgb(${r},${g},${bl})`;
    vctx.fillRect(0, y, VIRT_W, 1);
  }
  // Ground detail lines (perspective)
  vctx.fillStyle = isBoss ? '#3A2050' : isCave ? '#2E2E40' : '#1E4E1E';
  for (let i = 0; i < 5; i++) {
    const y = 102 + i * 8;
    vctx.fillRect(0, y, VIRT_W, 1);
  }
  // Bottom fill
  vctx.fillStyle = isBoss ? '#120820' : isCave ? '#18182A' : '#0A200A';
  vctx.fillRect(0, 140, VIRT_W, VIRT_H - 140);

  // Flash
  if (b.flashTimer > 0) {
    vctx.fillStyle = b.flashColor;
    vctx.globalAlpha = b.flashTimer / 12;
    vctx.fillRect(0, 0, VIRT_W, VIRT_H);
    vctx.globalAlpha = 1.0;
  }

  // Dibujar enemigos
  b.enemies.forEach((e, i) => {
    if (!e.alive) return;
    const ex = 30 + i * 45 + shakeX;
    const ey = 40 + i * 25 + shakeY;
    drawEnemySprite(ex, ey, e);
    // HP bar
    const hpPct = e.hp / e.maxHp;
    vctx.fillStyle = '#333';
    vctx.fillRect(ex - 5, ey + 30, 30, 3);
    vctx.fillStyle = hpPct > 0.5 ? PAL.green : hpPct > 0.25 ? PAL.yellow : PAL.red;
    vctx.fillRect(ex - 5, ey + 30, 30 * hpPct, 3);
    if (b.state === 'selectTarget' && i === b.targetCursor) {
      drawText(vctx, '▶', ex - 12, ey + 8, PAL.yellow, 8);
    }
  });

  // Dibujar party
  const partySpacing = b.party.length > 3 ? 28 : 35;
  b.party.forEach((p, i) => {
    const px = 180 + shakeX;
    const py = 20 + i * partySpacing + shakeY;
    if (p.alive) {
      drawBattleCharSprite(px, py, p);
    } else {
      // Caído
      vctx.fillStyle = '#444444';
      vctx.fillRect(px, py + 15, 16, 8);
    }
    // ATB gauge
    const atbPct = p.atbGauge / p.atbMax;
    vctx.fillStyle = '#333';
    vctx.fillRect(px + 20, py + 5, 30, 3);
    vctx.fillStyle = atbPct >= 1 ? PAL.yellow : PAL.blue;
    vctx.fillRect(px + 20, py + 5, 30 * atbPct, 3);
  });

  // Particles (enhanced)
  b.particles.forEach(p => {
    vctx.fillStyle = p.color;
    vctx.globalAlpha = Math.min(1, p.life / 20);
    const sz = p.size || 2;
    if (sz > 1.5) {
      vctx.beginPath(); vctx.arc(p.x, p.y, sz, 0, Math.PI*2); vctx.fill();
    } else {
      vctx.fillRect(p.x, p.y, sz + 1, sz + 1);
    }
  });
  vctx.globalAlpha = 1;
  // Floating damage/heal numbers
  drawFloatingTexts();

  // UI de batalla
  const uiH = b.party.length > 3 ? 75 : 60;
  drawBox(vctx, 0, VIRT_H - uiH, VIRT_W, uiH);

  // Mostrar stats del party
  const statRowH = b.party.length > 3 ? 14 : 18;
  b.party.forEach((p, i) => {
    const sx = 140;
    const sy = VIRT_H - uiH + 4 + i * statRowH;
    const nameColor = p.alive ? (p === b.activeChar ? PAL.yellow : PAL.white) : PAL.darkGray;
    drawText(vctx, p.name, sx, sy, nameColor, 7);
    drawText(vctx, 'HP:' + p.hp + '/' + p.maxHp, sx + 48, sy, p.hp < p.maxHp * 0.3 ? PAL.red : PAL.white, 7);
    if (statRowH >= 18) drawText(vctx, 'MP:' + p.mp, sx + 48, sy + 8, PAL.cyan, 7);
  });

  // Menú de acción
  if (b.state === 'selectAction') {
    drawBox(vctx, 4, VIRT_H - 58, 60, 54);
    b.actionMenu.forEach((a, i) => {
      const color = i === b.cursor ? PAL.yellow : PAL.white;
      if (i === b.cursor) drawText(vctx, '▶', 8, VIRT_H - 54 + i * 12, PAL.yellow, 8);
      drawText(vctx, a, 18, VIRT_H - 54 + i * 12, color, 8);
    });
  }

  // Menú de magia
  if (b.state === 'selectSkill' && b.activeChar) {
    const skills = b.activeChar.skills;
    drawBox(vctx, 4, VIRT_H - 58, 90, 54);
    skills.forEach((s, i) => {
      const color = i === b.skillCursor ? PAL.yellow : (b.activeChar.mp >= s.cost ? PAL.white : PAL.darkGray);
      if (i === b.skillCursor) drawText(vctx, '▶', 8, VIRT_H - 54 + i * 12, PAL.yellow, 8);
      drawText(vctx, s.name + ' ' + s.cost + 'MP', 18, VIRT_H - 54 + i * 12, color, 7);
    });
  }

  // Menú de objetos
  if (b.state === 'selectItem') {
    const items = game.items.filter(i => i.count > 0);
    drawBox(vctx, 4, VIRT_H - 58, 95, 54);
    items.forEach((item, i) => {
      const color = i === b.itemCursor ? PAL.yellow : PAL.white;
      if (i === b.itemCursor) drawText(vctx, '▶', 8, VIRT_H - 54 + i * 12, PAL.yellow, 8);
      drawText(vctx, item.name + ' x' + item.count, 18, VIRT_H - 54 + i * 12, color, 7);
    });
  }

  // Selección aliado
  if (b.state === 'selectAllyTarget') {
    b.party.forEach((p, i) => {
      if (i === b.targetCursor) {
        drawText(vctx, '▶', 132, VIRT_H - 56 + i * 18, PAL.yellow, 8);
      }
    });
  }

  // Mensaje
  if (b.message && b.messageTimer > 0) {
    drawBox(vctx, 4, VIRT_H - 74, VIRT_W - 8, 14);
    drawText(vctx, b.message, 8, VIRT_H - 72, PAL.white, 7);
  }

  // Victoria
  if (b.state === 'victory') {
    drawBox(vctx, 40, 60, 176, 60);
    drawText(vctx, '¡VICTORIA!', 88, 65, PAL.gold, 10);
    drawText(vctx, 'EXP: +' + b.totalExp, 60, 82, PAL.white, 8);
    drawText(vctx, 'Gil: +' + b.totalGil, 60, 94, PAL.gold, 8);
    drawText(vctx, 'Pulsa Enter para continuar', 50, 108, PAL.lightGray, 7);
  }

  // Derrota
  if (b.state === 'defeat') {
    drawBox(vctx, 40, 60, 176, 40);
    drawText(vctx, 'DERROTA...', 88, 68, PAL.red, 10);
    drawText(vctx, 'Pulsa Enter', 85, 85, PAL.lightGray, 8);
  }
}

function drawEnemySprite(x, y, enemy) {
  const c1 = enemy.color;
  const c2 = enemy.color2;
  const t = game.tick;

  if (enemy.name.includes('Slime')) {
    // Slime: bouncy translucent blob with inner shine
    const bounce = Math.abs(Math.sin(t * 0.08)) * 2;
    const squish = Math.cos(t * 0.08);
    const rx = 12 + squish, ry = 8 - squish;
    // Shadow on ground
    vctx.fillStyle = 'rgba(0,0,0,0.3)';
    vctx.beginPath(); vctx.ellipse(x + 10, y + 27, 10, 3, 0, 0, Math.PI * 2); vctx.fill();
    // Outer body
    vctx.fillStyle = c1;
    vctx.beginPath(); vctx.ellipse(x + 10, y + 18 - bounce, rx, ry, 0, 0, Math.PI * 2); vctx.fill();
    // Inner darker area
    vctx.fillStyle = c2;
    vctx.beginPath(); vctx.ellipse(x + 10, y + 20 - bounce, rx - 2, ry - 2, 0, 0, Math.PI); vctx.fill();
    // Highlight shine
    vctx.fillStyle = 'rgba(255,255,255,0.35)';
    vctx.beginPath(); vctx.ellipse(x + 7, y + 13 - bounce, 4, 3, -0.3, 0, Math.PI * 2); vctx.fill();
    // Eyes (cute)
    vctx.fillStyle = PAL.white;
    vctx.fillRect(x + 5, y + 15 - bounce, 4, 4);
    vctx.fillRect(x + 12, y + 15 - bounce, 4, 4);
    vctx.fillStyle = PAL.black;
    vctx.fillRect(x + 6, y + 16 - bounce, 2, 2);
    vctx.fillRect(x + 14, y + 16 - bounce, 2, 2);
    // Mouth
    vctx.fillStyle = '#116611';
    vctx.fillRect(x + 9, y + 20 - bounce, 3, 1);

  } else if (enemy.name.includes('Lobo')) {
    // Wolf: detailed quadruped with fur texture
    vctx.fillStyle = 'rgba(0,0,0,0.25)';
    vctx.beginPath(); vctx.ellipse(x + 12, y + 28, 12, 3, 0, 0, Math.PI * 2); vctx.fill();
    // Body
    vctx.fillStyle = c1;
    vctx.fillRect(x + 2, y + 10, 20, 13);
    // Fur highlights
    vctx.fillStyle = '#666666';
    for (let i = 0; i < 5; i++) px(vctx, x + 4 + i * 4, y + 12, '#777777');
    px(vctx, x + 8, y + 14, '#707070'); px(vctx, x + 15, y + 16, '#707070');
    // Head
    vctx.fillStyle = c1;
    vctx.fillRect(x + 18, y + 5, 10, 11);
    vctx.fillRect(x + 22, y + 8, 6, 8); // Snout
    // Ears
    vctx.fillStyle = c2;
    vctx.fillRect(x + 19, y + 2, 3, 4);
    vctx.fillRect(x + 24, y + 2, 3, 4);
    vctx.fillStyle = '#553333';
    px(vctx, x + 20, y + 3, '#884444'); px(vctx, x + 25, y + 3, '#884444');
    // Eye (red, menacing)
    vctx.fillStyle = '#FF2222';
    vctx.fillRect(x + 22, y + 8, 3, 2);
    px(vctx, x + 23, y + 8, '#FF4444');
    // Nose + teeth
    px(vctx, x + 27, y + 10, PAL.black);
    vctx.fillStyle = PAL.white;
    px(vctx, x + 26, y + 13, PAL.white); px(vctx, x + 24, y + 13, PAL.white);
    // Legs (animated)
    const legAnim = Math.sin(t * 0.1) * 1;
    vctx.fillStyle = c2;
    vctx.fillRect(x + 4, y + 22, 3, 6 + legAnim);
    vctx.fillRect(x + 10, y + 22, 3, 6 - legAnim);
    vctx.fillRect(x + 16, y + 22, 3, 6 + legAnim);
    // Paws
    vctx.fillStyle = '#222222';
    vctx.fillRect(x + 3, y + 27, 5, 2);
    vctx.fillRect(x + 9, y + 27, 5, 2);
    vctx.fillRect(x + 15, y + 27, 5, 2);
    // Tail
    vctx.fillStyle = c1;
    const tailY = Math.sin(t * 0.15) * 2;
    vctx.fillRect(x - 2, y + 10 + tailY, 5, 2);
    vctx.fillRect(x - 4, y + 9 + tailY, 3, 2);

  } else if (enemy.name.includes('Murci')) {
    // Bat: proper wing shape with animation
    const wingAngle = Math.sin(t * 0.25) * 0.4;
    // Shadow
    vctx.fillStyle = 'rgba(0,0,0,0.2)';
    vctx.beginPath(); vctx.ellipse(x + 10, y + 28, 8, 2, 0, 0, Math.PI * 2); vctx.fill();
    // Body
    vctx.fillStyle = c1;
    vctx.fillRect(x + 7, y + 11, 8, 8);
    // Head
    vctx.fillRect(x + 8, y + 8, 6, 5);
    // Ears (pointed)
    vctx.fillRect(x + 8, y + 5, 2, 4);
    vctx.fillRect(x + 12, y + 5, 2, 4);
    // Eyes (glowing red)
    vctx.fillStyle = '#FF0033';
    vctx.fillRect(x + 9, y + 9, 2, 2);
    vctx.fillRect(x + 12, y + 9, 2, 2);
    // Mouth (fangs)
    vctx.fillStyle = PAL.white;
    px(vctx, x + 10, y + 12, PAL.white);
    px(vctx, x + 12, y + 12, PAL.white);
    // Wings (animated)
    const wingUp = Math.sin(t * 0.25) * 4;
    vctx.fillStyle = c1;
    // Left wing
    vctx.beginPath();
    vctx.moveTo(x + 7, y + 12);
    vctx.lineTo(x - 4, y + 8 + wingUp);
    vctx.lineTo(x - 6, y + 12 + wingUp);
    vctx.lineTo(x - 2, y + 16 + wingUp * 0.5);
    vctx.lineTo(x + 7, y + 18);
    vctx.fill();
    // Right wing
    vctx.beginPath();
    vctx.moveTo(x + 15, y + 12);
    vctx.lineTo(x + 26, y + 8 + wingUp);
    vctx.lineTo(x + 28, y + 12 + wingUp);
    vctx.lineTo(x + 24, y + 16 + wingUp * 0.5);
    vctx.lineTo(x + 15, y + 18);
    vctx.fill();
    // Wing bone lines
    vctx.fillStyle = c2;
    vctx.fillRect(x + 3, y + 11 + wingUp * 0.5, 4, 1);
    vctx.fillRect(x + 15, y + 11 + wingUp * 0.5, 4, 1);

  } else if (enemy.name.includes('Esqueleto')) {
    // Skeleton: detailed bone structure
    vctx.fillStyle = 'rgba(0,0,0,0.2)';
    vctx.beginPath(); vctx.ellipse(x + 10, y + 29, 8, 2, 0, 0, Math.PI * 2); vctx.fill();
    // Skull
    vctx.fillStyle = c1;
    vctx.fillRect(x + 5, y + 1, 10, 10);
    vctx.fillRect(x + 6, y, 8, 1);
    // Eye sockets (dark)
    vctx.fillStyle = PAL.black;
    vctx.fillRect(x + 6, y + 3, 3, 3);
    vctx.fillRect(x + 11, y + 3, 3, 3);
    // Eye glow
    vctx.fillStyle = '#FF4444';
    px(vctx, x + 7, y + 4, '#FF4444');
    px(vctx, x + 12, y + 4, '#FF4444');
    // Nose
    vctx.fillStyle = '#888877';
    px(vctx, x + 9, y + 7, '#888877');
    px(vctx, x + 10, y + 7, '#888877');
    // Jaw
    vctx.fillStyle = c2;
    vctx.fillRect(x + 6, y + 9, 8, 3);
    vctx.fillStyle = PAL.black;
    vctx.fillRect(x + 7, y + 10, 6, 1);
    // Spine + ribcage
    vctx.fillStyle = c1;
    vctx.fillRect(x + 9, y + 12, 2, 10);
    // Ribs
    for (let i = 0; i < 3; i++) {
      vctx.fillRect(x + 5, y + 13 + i * 3, 10, 1);
      vctx.fillStyle = c2;
      vctx.fillRect(x + 6, y + 14 + i * 3, 8, 1);
      vctx.fillStyle = c1;
    }
    // Pelvis
    vctx.fillRect(x + 6, y + 22, 8, 2);
    // Arms
    vctx.fillRect(x + 2, y + 13, 3, 2);
    vctx.fillRect(x + 1, y + 15, 2, 6);
    vctx.fillRect(x + 15, y + 13, 3, 2);
    vctx.fillRect(x + 17, y + 15, 2, 6);
    // Legs
    vctx.fillRect(x + 6, y + 24, 2, 5);
    vctx.fillRect(x + 12, y + 24, 2, 5);
    // Sword
    vctx.fillStyle = '#BBBBCC';
    vctx.fillRect(x + 18, y + 7, 2, 14);
    vctx.fillStyle = '#8888AA';
    vctx.fillRect(x + 16, y + 10, 6, 2);
    px(vctx, x + 19, y + 6, '#DDDDEE');

  } else if (enemy.name.includes('Caballero')) {
    // Dark Knight: imposing armored figure
    vctx.fillStyle = 'rgba(0,0,0,0.3)';
    vctx.beginPath(); vctx.ellipse(x + 10, y + 29, 10, 3, 0, 0, Math.PI * 2); vctx.fill();
    // Helmet
    vctx.fillStyle = c1;
    vctx.fillRect(x + 4, y, 12, 12);
    vctx.fillRect(x + 3, y + 2, 14, 8);
    // Helmet crest
    vctx.fillStyle = '#333366';
    vctx.fillRect(x + 8, y - 3, 4, 4);
    vctx.fillRect(x + 9, y - 5, 2, 3);
    // Visor (glowing eyes)
    vctx.fillStyle = '#330000';
    vctx.fillRect(x + 5, y + 5, 10, 3);
    vctx.fillStyle = '#FF2244';
    vctx.fillRect(x + 6, y + 6, 3, 1);
    vctx.fillRect(x + 11, y + 6, 3, 1);
    // Armor body
    vctx.fillStyle = c2;
    vctx.fillRect(x + 2, y + 12, 16, 12);
    vctx.fillStyle = c1;
    vctx.fillRect(x + 4, y + 13, 12, 10);
    // Chest plate detail
    vctx.fillStyle = '#333355';
    vctx.fillRect(x + 7, y + 14, 6, 2);
    vctx.fillRect(x + 8, y + 16, 4, 3);
    // Pauldrons (shoulder armor)
    vctx.fillStyle = '#222244';
    vctx.fillRect(x, y + 12, 4, 5);
    vctx.fillRect(x + 16, y + 12, 4, 5);
    vctx.fillStyle = '#333366';
    px(vctx, x + 1, y + 13, '#333366'); px(vctx, x + 17, y + 13, '#333366');
    // Legs (armored)
    vctx.fillStyle = c1;
    vctx.fillRect(x + 4, y + 24, 4, 5);
    vctx.fillRect(x + 12, y + 24, 4, 5);
    // Sabatons
    vctx.fillStyle = '#111133';
    vctx.fillRect(x + 3, y + 28, 6, 2);
    vctx.fillRect(x + 11, y + 28, 6, 2);
    // Dark sword (large, glowing)
    vctx.fillStyle = '#4444AA';
    vctx.fillRect(x + 19, y - 2, 3, 22);
    vctx.fillStyle = '#6666CC';
    vctx.fillRect(x + 20, y - 1, 1, 20);
    // Crossguard
    vctx.fillStyle = '#553399';
    vctx.fillRect(x + 16, y + 9, 10, 3);
    // Sword glow
    const glow = Math.sin(t * 0.1) * 0.3 + 0.3;
    vctx.fillStyle = `rgba(100,100,255,${glow})`;
    vctx.fillRect(x + 18, y - 2, 5, 22);

  } else if (enemy.name.includes('Señor')) {
    // Boss: Señor de las Sombras - massive and intimidating
    const pulse = Math.sin(t * 0.05) * 3;
    const breathe = Math.sin(t * 0.03) * 1;
    // Dark aura (pulsing)
    for (let ring = 3; ring >= 0; ring--) {
      vctx.fillStyle = `rgba(80,0,140,${0.08 + ring * 0.03})`;
      vctx.beginPath();
      vctx.ellipse(x + 20, y + 28, 28 + pulse + ring * 5, 18 + pulse + ring * 3, 0, 0, Math.PI * 2);
      vctx.fill();
    }
    // Shadow on ground
    vctx.fillStyle = 'rgba(60,0,100,0.5)';
    vctx.beginPath(); vctx.ellipse(x + 20, y + 46, 22, 5, 0, 0, Math.PI * 2); vctx.fill();
    // Cape (flowing)
    vctx.fillStyle = c2;
    vctx.fillRect(x - 2, y + 8 + breathe, 44, 38);
    vctx.fillRect(x, y + 6 + breathe, 40, 4);
    // Cape folds
    vctx.fillStyle = '#180028';
    for (let i = 0; i < 4; i++) {
      vctx.fillRect(x + 2 + i * 10, y + 12, 2, 30);
    }
    // Inner robe
    vctx.fillStyle = c1;
    vctx.fillRect(x + 6, y + 10 + breathe, 28, 32);
    // Torso detail
    vctx.fillStyle = '#550088';
    vctx.fillRect(x + 12, y + 14, 16, 6);
    vctx.fillRect(x + 14, y + 20, 12, 4);
    // Chains
    vctx.fillStyle = '#888899';
    for (let i = 0; i < 3; i++) px(vctx, x + 13 + i * 4, y + 13, '#888899');
    // Head/helmet
    vctx.fillStyle = '#330055';
    vctx.fillRect(x + 10, y - 6 + breathe, 20, 18);
    vctx.fillRect(x + 8, y - 4 + breathe, 24, 14);

    vctx.fillRect(x + 7, y - 10, 4, 7);
    vctx.fillRect(x + 13, y - 13, 5, 10);
    vctx.fillRect(x + 20, y - 15, 4, 12);
    vctx.fillRect(x + 27, y - 10, 4, 7);
    // Crown gems
    vctx.fillStyle = '#FF0066';
    px(vctx, x + 8, y - 9, '#FF0066');
    px(vctx, x + 15, y - 12, '#FF0066');
    px(vctx, x + 21, y - 14, '#FF0066');
    px(vctx, x + 28, y - 9, '#FF0066');
    // Eyes (menacing glow)
    vctx.fillStyle = '#FF0044';
    vctx.fillRect(x + 14, y + 1 + breathe, 4, 3);
    vctx.fillRect(x + 22, y + 1 + breathe, 4, 3);
    vctx.fillStyle = '#FF4466';
    vctx.fillRect(x + 15, y + 2 + breathe, 2, 1);
    vctx.fillRect(x + 23, y + 2 + breathe, 2, 1);
    // Mouth (sinister grin)
    vctx.fillStyle = '#AA0033';
    vctx.fillRect(x + 15, y + 7 + breathe, 10, 2);
    vctx.fillStyle = '#FF2244';
    for (let i = 0; i < 4; i++) px(vctx, x + 16 + i * 2, y + 7 + breathe, '#FF2244');
    // Clawed hands
    vctx.fillStyle = '#440066';
    vctx.fillRect(x - 6, y + 18, 8, 8);
    vctx.fillRect(x + 38, y + 18, 8, 8);
    // Claws
    vctx.fillStyle = '#AA44DD';
    for (let i = 0; i < 4; i++) {
      vctx.fillRect(x - 8 + i * 2, y + 25, 1, 4);
      vctx.fillRect(x + 39 + i * 2, y + 25, 1, 4);
    }
    // Orbiting dark energy
    const orb = t * 0.08;
    for (let i = 0; i < 4; i++) {
      const ox = Math.sin(orb + i * 1.57) * 25;
      const oy = Math.cos(orb + i * 1.57) * 15;
      vctx.fillStyle = `rgba(180,0,255,${0.5 + 0.3 * Math.sin(t * 0.1 + i)})`;
      vctx.beginPath();
      vctx.arc(x + 20 + ox, y + 20 + oy, 3 + Math.sin(t * 0.15 + i) * 1.5, 0, Math.PI * 2);
      vctx.fill();
      // Small trail
      vctx.fillStyle = `rgba(120,0,200,0.3)`;
      vctx.beginPath();
      vctx.arc(x + 20 + ox * 0.7, y + 20 + oy * 0.7, 2, 0, Math.PI * 2);
      vctx.fill();
    }
  }
}
